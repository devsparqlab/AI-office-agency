task:
  id: "TASK-060"
  title: "Game-Scoped Turnover Producer Readiness"
  short_name: "game-turnover-producer"
  parent: "TASK-058"
  epic: "Mobile Missions integration"
  type: feature
  priority: medium
  created_at: "2026-05-20"
scope:
  target_services:
    - service: Games-Labs-Game
      reason: >
        Owns round settlement persistence, canonical round.settled publishing, game_id/game_type
        enrichment from persisted game row, and the natural extension point for a game-scoped
        turnover emission alongside or after verified settlement inserts.
    - service: Games-Labs-Provider
      reason: >
        Provider payloads (for example aggregate fields like valid_turnover in AFB models) likely
        hold the authoritative stake/turnover input that must propagate into settlement if Game is to
        produce settled_amount deterministically without inventing values.
    - service: Games-Labs-Order
      reason: >
        Today emits exchange-order turnover.settled with settled_amount but no game scope; confirm
        it does not unintentionally overlap with the new semantics and reuse event_id patterns where
        useful.
    - service: Games-Labs-Wallet
      reason: >
        Inspect only if product/architecture dictates turnover SoT stays on ledger debits rather
        than provider or round lifecycle payloads.
    - service: shared-lib
      reason: >
        Canonical JSON contract events.PlayerActivityEvent already includes settled_amount,
        game_id, and game_type; prefer reuse and additive fields only under strict justification;
        README documents producer ownership alongside TASK-061 consumer onboarding.
  affected_files:
    - path: "shared-lib/events/player_activity.go"
      action: modify
      description: "Only if new fields are unavoidable; otherwise unchanged — verify payload builders."
    - path: "shared-lib/README.md"
      action: modify
      description: "Document authoritative producer for scoped turnover alongside existing Order-vs-Game table."
    - path: "Games-Labs-Game/internal/models/game.go"
      action: modify
      description: "Likely extend RoundLifecycle (or adjacent request DTOs) once turnover SoT exists at ingress."
    - path: "Games-Labs-Game/migrations/run.go"
      action: modify
      description: "Embeds new Goose migration when schema needs persisted turnover for idempotency/audit."
    - path: "Games-Labs-Game/migrations/008_round_lifecycle_turnover.sql"
      action: create
      description: "Representative migration path for persisted turnover linkage; numbering may advance with existing Goose sequence."
    - path: "Games-Labs-Game/internal/core/repositories/game.go"
      action: modify
      description: "Upsert/Get round lifecycle mappings if new columns arrive."
    - path: "Games-Labs-Game/internal/core/services/gamesvc/player_activity.go"
      action: modify
      description: "Add turnover.settled (and reversal) publishing preserving deterministic event_id rules."
    - path: "Games-Labs-Game/internal/core/services/gamesvc/service.go"
      action: modify
      description: "Wire publish after same idempotent insert gate used for round.settled; align ReverseRound path."
    - path: "Games-Labs-Game/internal/core/services/gamesvc/player_activity_test.go"
      action: modify
      description: "Extend stubs/mocks if publisher gains turnover paths."
    - path: "Games-Labs-Game/internal/core/services/gamesvc/round_lifecycle_test.go"
      action: modify
      description: "Assert duplicate settlement does not double-publish scoped turnover semantics."
    - path: "Games-Labs-Provider/internal/core/models/providers/afb/afb.go"
      action: modify
      description: "If selected as SoT, map ingest fields through to Game settlement callers when applicable."
    - path: "Games-Labs-Game/README.md"
      action: modify
      description: "Producer QA notes covering event schema, duplicates, reversal, TASK-061 handoff."
description: |
  Unblock TASK-058 / TASK-061 by proving a trustworthy producer emits player.activity.v1
  turnover.settled with settled_amount strictly greater than zero for game-backed play alongside
  game_id, game_type, source_reference_id/type, deterministic event_id, and Asia/Bangkok-relevant
  occurred_at parity with other Daily Activity producers.

  Verified repository facts (2026-05-20):
  - shared-lib/events.PlayerActivityEvent already models settled_amount plus game scope fields without new proto.
  - Games-Labs-Order emits turnover.* only for exchange-package orders via ordersvc/player_activity.go
    with source_reference_type=order and no game identifiers.
  - Games-Labs-Game publishes round.settled from publishRoundSettled with round_count=1 and deterministic
    event ids keyed by round_id; RoundLifecycle persists user, round_id, canonical game UUID, resolved
    game_type, timestamps, promotional flag — but retains no wager/turnover amount today.
  - round_lifecycles table lacks a turnover column; adding settled_amount persistence likely requires a new migration.
  - Local repo search finds SettleRound used from gamesvc/service tests only; confirming production callers
    and provider→Game ingress remains part of discovery (risk below).

acceptance_criteria:
  - criterion: "On first successful persisted settlement insert for a gameplay round path, publisher emits turnover.settled with settled_amount > 0, canonical game UUID as game_id, non-empty game_type, source_reference_id and source_reference_type, source_service=games-labs-game, deterministic event_id stable on retries, OccurredAt set to settlement semantics consistent with Daily Activities."
  - criterion: "Repeated settlement attempts for the same idempotent lifecycle key do not publish duplicate turnover.* or increment downstream-visible activity twice."
  - criterion: "Document whether turnover.reversed is emitted on ReverseRound correction; if emitted, ReverseOfEventID links to the originating turnover.settled event_id and reversal is idempotent the same pattern as daily reversals elsewhere."
  - criterion: "Automated tests demonstrate a positively scoped turnover event with full metadata; tests demonstrate no turnover.settled when amount is absent/zero or canonical game identifiers cannot be established."
  - criterion: "Games-Labs-Game README (and shared-lib README if contract semantics broaden) spells out TASK-061 consumer expectations."

plan:
  approach: |
    (1) Trace the real production path that terminates in Game settlement (provider HTTP/gRPC adapters,
        internal handlers, eventual SettleRound or successor API). Decide authoritative turnover SoT —
    provider-derived valid turnover or stake summaries, persisted Game fields, ledger events, or a new normalized DTO —
    aligning with TASK-058 game_id wins rule at producer boundaries.

    (2) If SoT attaches to RoundLifecycle ingress, persist the settled turnover amount atomically with
    round_lifecycles ON CONFLICT idempotency so publish-once aligns with TASK-052 style insert gates.

    (3) Add a deliberate publishTurnover* helper analogous to publishRoundSettled emitting
    turnover.settled with deterministic event_id distinct from round.settled IDs (reuse patterns from
    orderTurnover helpers or round keying as appropriate). Maintain Order exchange turnover unchanged.

    (4) Extend ReverseRound to emit turnover.reversed when forward turnover exists; mirror reverse_of_event_id linkage.

    (5) Finish with integration/unit tests touching publisher mocks and migrations if schema grew.
  subtasks:
    - order: 1
      id: "trace-sot-turnover-source"
      description: >
        Locate production settlement ingress feeding Game; catalogue provider payloads and Game service
        entrypoints; capture written decision memo in Games-Labs-Game/README covering SoT field,
        event_id hashing, duplication, reversal, and TASK-058 game_id producer precedence.
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/README.md"
        - "Games-Labs-Provider/internal/core/models/providers/afb/afb.go"
      parallel_safe: false
    - order: 2
      id: "schema-and-models-turnover-sot"
      description: >
        When persistence is required for idempotency/audit or cross-request replay prevention, add Goose
        migration + repository mapping + RoundLifecycle fields for authoritative settled_amount linkage to round_id key.
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/migrations/run.go"
        - "Games-Labs-Game/migrations/008_round_lifecycle_turnover.sql"
        - "Games-Labs-Game/internal/models/game.go"
        - "Games-Labs-Game/internal/core/repositories/game.go"
      parallel_safe: false
    - order: 3
      id: "emit-turnover-settled-reverse"
      description: >
        Implement turnover.settled publish on inserted settlement lifecycle and reversal publish as decided;
        ensure skip conditions prevent publishing without amount or game identifiers; reuse shared-lib fields only.
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/internal/core/services/gamesvc/player_activity.go"
        - "Games-Labs-Game/internal/core/services/gamesvc/service.go"
      parallel_safe: false
    - order: 4
      id: "tests-and-cross-readme"
      description: >
        Add focused publisher tests validating positive and guard negative cases; extend shared-lib README
        if producer ownership table changes materially.
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/internal/core/services/gamesvc/round_lifecycle_test.go"
        - "Games-Labs-Game/internal/core/services/gamesvc/player_activity_test.go"
        - "shared-lib/README.md"
      parallel_safe: false
  risks:
    - risk: "Production SettleRound caller path is not evident from scoped search; ingress may rely on stubs or unpublished handlers."
      mitigation: "Elevate ingress discovery to first subtask; partner with orchestrator/DevOps staging traces if repos lack linkage."
    - risk: "Provider turnover semantics may be currency- or RTP-specific; mapping to settled_amount may need normalization."
      mitigation: "Document unit + currency assumptions in README; escalate to PM/product if contradictory with exchange turnover."
    - risk: "Duplicated emissions if turnover is published independently of existing insert guards."
      mitigation: "Bind turnover publishes to identical inserted flag from UpsertRoundSettlement or unify into single transactional unit of work."
  estimated_complexity: high
assignment:
  primary: dev-2
  parallel: false
  reason: "Cross-layer discovery across Game plus provider adapters, likely schema and dual-event publishing semantics."
summary: |
  TASK-060 formalizes the producer backlog for TASK-058: extend Game settlement so idempotent inserts can
  emit game-scoped turnover.settled carrying settled_amount and metadata reuse from shared-lib, then document
  and test duplication and reversal semantics before TASK-061 consumer work consumes the contract.

