summary: |
  Approved. TASK-063 preserves `ListCategory` as a public catalog while adding
  optional per-game playability metadata for authenticated users. The shared-lib
  contract is additive, Games-Labs-Game consumes the published shared-lib version
  `v0.0.0-20260521084502-88c071b64c68` without a replace directive, and the
  implementation reuses the same Golden Pass access rule already used by `List`
  and `LaunchGame`.

  Guest requests now receive unknown/null playability metadata, authenticated
  requests receive evaluated `is_playable` / `playability_reason` fields, locked
  games remain visible in the catalog, and `LaunchGame` behavior remains the
  authoritative enforcement path.

