description: |
  Implement "Spend N Diamonds" daily missions using a new condition type (SPEND_DIAMOND_AMOUNT) separate from
  SPEND_AMOUNT (THB only). Extend the shared PlayerActivityEvent with optional spend_currency on spend.settled /
  spend.reversed (omitted defaults to THB for backward compatibility). Games-Labs-Wallet publishes authoritative
  settled net Diamond spend and reversals. Games-Labs-Missions maps Diamond events only to the new condition,
  preserves Bangkok-day bucketing and existing reverse idempotency, and tightens admin validation so THB and
  Diamond missions are unambiguous. Optional Games-Labs-Order change sets explicit THB on existing publishers.

acceptance_criteria:
  - criterion: PlayerActivityEvent supports optional spend_currency for spend.* with documented THB default when omitted.
  - criterion: Wallet emits spend.settled / spend.reversed for settled net Diamond debits and refunds with idempotent event_id and DIAMOND currency.
  - criterion: Missions SPEND_DIAMOND_AMOUNT progresses only from Diamond spend events; SPEND_AMOUNT remains THB-only with validation unchanged in intent.
  - criterion: Reversals reduce Diamond mission progress consistent with forward applications for the same Bangkok day window.
  - criterion: Automated tests cover Diamond forward/reverse and THB regression; README documents condition vs currency for operators and mobile.

plan:
  approach: |
    Ship a backward-compatible event extension in shared-lib, add a wallet RabbitMQ publisher mirroring Order,
    instrument all settled Diamond movements in the wallet, then teach Missions a new condition type and mapper
    rules keyed off spend_currency. Optionally make Order emit explicit THB for clarity.
  subtasks:
    - order: 1
      id: 057-player-activity-contract
      description: Extend shared-lib PlayerActivityEvent and wallet source constant; publish shared-lib version for consumers.
      agent: dev-2
