summary: |
  Implemented TASK-049 inside Games-Labs-Missions and docs only.

  The Daily Activity read model now filters user-facing rows to active configured activities, returns description/condition/scope/threshold metadata, and feeds both missions progress and quest overview. claim-daily now validates the current Bangkok-day activity state before idempotency reservation or wallet credit, returning business conflicts for incomplete/already-claimed activity and gone for inactive or unconfigured activity. Phase 1B admin activity config now accepts and persists condition fields with service validation for THB-only SPEND_AMOUNT and round-count scope requirements.

  Added migration 018 for Phase 1A TURNOVER_AMOUNT and SPEND_AMOUNT THB seed rows; the existing go:embed *.sql migration runner picks it up without a manual list. README now documents the mobile integration flow, endpoint roles, status-to-button mapping, backend-event progress ownership, staging QA checklist, THB spend wording, and Phase 2 gaps.

  Reviewer follow-up fixes were applied: migration 018 now uses ON CONFLICT DO NOTHING so reruns do not overwrite admin edits or deactivations; GetProgress no longer falls back to unfiltered ListDailyActivities and has a fail-closed regression test; admin PUT rejects immutable condition/scope field changes while allowing omitted immutable fields to retain existing values.
