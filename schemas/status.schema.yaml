# NOT loaded at runtime. The canonical runtime validator is validate-yaml.rb
# (rules are hardcoded in Ruby); this schema is documentation/tooling only.
# tests/integration/schema-validator-parity.sh keeps the two in sync. (S7)
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://sparqlab.local/ai-dev-office/schemas/status.schema.yaml"
title: AI Dev Office Status Schema
description: >
  Validation schema for `runs/<task-id>/status.yaml`. This captures task state,
  assignment, iteration tracking, and transition history used by the workflow.
type: object
additionalProperties: false
required:
  - task_id
  - phase
  - iteration
  - current_agent
properties:
  task_id:
    type: string
    pattern: "^TASK(?:-PKG)?-[0-9]+$"
  phase:
    type: string
    enum:
      - pending
      - blocked
      - assigned
      - assigned_parallel
      - review
      - in_review
      - debugging
      - debugging_complete
      - devops_needed
      - devops_complete
      - escalated
      - free_roam_complete
      - validation_failed
      - done
      - aborted
  state:
    type: string
    enum:
      - pending
      - blocked
      - assigned
      - assigned_parallel
      - review
      - in_review
      - debugging
      - debugging_complete
      - devops_needed
      - devops_complete
      - escalated
      - free_roam_complete
      - validation_failed
      - done
      - aborted
  iteration:
    type: integer
    minimum: 0
  free_roam_entries:
    type: integer
    minimum: 0
    description: Completed free-roam passes (non-resettable). Drives the free-roam halt guard.
  validation_failed_retries:
    type: integer
    minimum: 0
    description: Times the task entered validation_failed (non-resettable). Drives the validation-failed halt guard.
  last_synced_output:
    type: object
    description: Fingerprint of the last agent output synced (M2 idempotency guard).
    additionalProperties: true
  current_agent:
    anyOf:
      - type: "null"
      - type: string
        enum:
          - pm
          - dev
          - dev-2
          - reviewer
          - debugger
          - devops
          - free-roam
          - done
  assignment:
    type: object
    additionalProperties: false
    required:
      - primary
      - parallel
    properties:
      primary:
        type: string
        enum:
          - pm
          - dev
          - dev-2
          - reviewer
          - debugger
          - devops
          - free-roam
      parallel:
        type: boolean
  created_at:
    type: string
  updated_at:
    type: string
  # Idempotency marker for driver-side decision reconcile: the decided_at of the
  # most recent human decision already applied to this task's workflow.
  decision_applied_at:
    type: string
  ready:
    type: boolean
  blocked_on:
    type: array
    items:
      type: string
      pattern: "^TASK(?:-PKG)?-[0-9]+$"
  waiting_for:
    type: array
    items:
      type: string
  handoff:
    type: object
    additionalProperties: false
    required:
      - from
      - to
      - artifact
    properties:
      from:
        type: string
        enum:
          - pm
          - dev
          - dev-2
          - reviewer
          - debugger
          - devops
          - free-roam
          - done
          - orchestrator
      to:
        type: string
        enum:
          - pm
          - dev
          - dev-2
          - reviewer
          - debugger
          - devops
          - free-roam
          - done
      artifact:
        type: string
  history:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - phase
        - agent
        - reason
      properties:
        phase:
          type: string
          description: Human-readable transition string such as `pending -> review`.
        agent:
          type: string
          enum:
            - pm
            - dev
            - dev-2
            - reviewer
            - debugger
            - devops
            - free-roam
            - orchestrator
        reason:
          type: string
  pm_output:
    type: object
  dev_output:
    type: object
  reviewer_output:
    type: object
  debugger_output:
    type: object
  devops_output:
    type: object
  free_roam_output:
    type: object
  planner_output:
    type: object
  tester_output:
    type: object
