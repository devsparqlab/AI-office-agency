task_id: TASK-079
agent: dev
status: in_review
iteration: 1
summary: |
  Phase 1 wired the redemption library admin page to the Order admin API (Brand
  and Collection Tag reads, Collection Tag create/update, pending/error states,
  localStorage reduced to arrange order). Order service then gained an
  S3-compatible image upload endpoint (MinIO now, AWS S3 later by config only):
  configurable storage client, multipart UploadHTTP with type/size validation,
  and focused tests. Remaining work is the gateway upload route, the frontend
  uploader, and Phase 2 brand create/update.
completed:
- Added API helper/types/mappers for redemptions and tags (camelCase, status.code check).
- redemptionToBrandRow / tagToCollectionRow map status as `=== true ? Active : Inactive`.
- refreshRedemptionsFromApi + retargeted refreshCollectionTagsFromApi; parallel on mount.
- Collection Tag create/update + quick-add now call the tags API and keep redemptionIds.
- Dropped the unsupported brandName requirement from the collection form.
- Reduced localStorage to the manual arrange order only (new key, seeds removed).
- Server-side search/date via the Search button; pending/error UI added.
- Gated submitBrand with a toast until the upload chain exists.
- Added Order config struct `storage` with S3_* env (default ForcePathStyle=true).
- Added infrastructures/storage.go S3-compatible Uploader (aws-sdk-go-v2).
- Added adminorderhdl.UploadHTTP (auth, content sniff, 5MB, key redemptions/{uuid}.{ext}).
- Registered POST /uploads on the Order HTTP mux; injected uploader via New(os, uploader).
- Added 5 focused upload tests (OK, 403, 503, 415, 400).
- Added an authed /uploads group in the api-gateway proxied to OrderHTTPURL (separate
  top-level group to avoid the /api catch-all conflict).
- Added order-http-url to the gateway configmap and ORDER_HTTP_URL to the deployment.
- Corrected the gateway order-http-url to the real Order HTTP port 8087 (deployment
  override of the Go default 8086); the Order Service already exposes 8087.
- Added composables/useImageUpload.ts (multipart POST to the gateway /uploads, no
  Content-Type so the browser sets the multipart boundary).
- Replaced the brand modal FileReader->data URL flow with a real upload; logoUrl is
  always a real URL, with upload pending/error UI.
- Wired submitBrand to create/update redemptions (POST /redemptions[/{id}]), sending
  the uploaded thumbnailUrl, preserving tagIds on update, mapping the singular
  redemptions object from the response.
- Wired S3_* through the Order deployment (configMap refs for endpoint/region/bucket/
  force-path-style/public-base-url, secret refs for access/secret keys; all optional),
  added the S3 keys to the Order configmap, and extended the deploy workflow to create
  them from GitHub Secrets. All three YAML files parse; key names match end to end.
