task:
  id: "TASK-064"
  title: "Games-Labs-Game Runtime API URL Wiring"
  short_name: "game-runtime-api-url-wiring"
  parent: "TASK-062"
  epic: "Game access runtime hardening"
  type: bugfix
  priority: medium
  created_at: "2026-05-21"

scope:
  target_services:
    - service: Games-Labs-Game
      reason: >
        Runtime env wiring for USER_API_URL and MISSIONS_API_URL must exist in k3s
        manifests, deploy workflow, and local examples so authenticated ListGame and
        Golden Pass integrations behave the same way in cluster as they do in code.
  affected_files:
    - path: "Games-Labs-Game/k3s/configmap.yaml"
      action: modify
      description: "Default in-cluster user-api-url and missions-api-url values."
    - path: "Games-Labs-Game/k3s/deployment.yaml"
      action: modify
      description: "Export USER_API_URL and MISSIONS_API_URL into the game container."
    - path: "Games-Labs-Game/.github/workflows/deploy.yml"
      action: modify
      description: "Apply ConfigMap keys during deploy and allow GitHub Secrets override."
    - path: "Games-Labs-Game/.env.example"
      action: modify
      description: "Document the same defaults used by cluster manifests."
    - path: "Games-Labs-Game/cmd/main.go"
      action: review
      description: "Confirm USER_API_URL / MISSIONS_API_URL wiring is consumed as expected."
    - path: "Games-Labs-Game/internal/core/services/gamesvc/service.go"
      action: review
      description: "Confirm missing USER_API_URL explains guest-like ListGame behavior."

description: |
  Track and verify the runtime env fix that unblocked authenticated ListGame filtering
  in Games-Labs-Game.

  Root cause: the cluster runtime lacked USER_API_URL, so the Game service never created
  its User adapter. In that state ListGame behaved like guest access and returned all
  games even when user_profiles.level and games.level data were correct. The same runtime
  surface also needs MISSIONS_API_URL so Golden Pass checks work consistently in cluster.

  The code/config changes are already present in the repo. This task is for operational
  tracking: verify the manifest/workflow contract, ensure .env example alignment, and
  give reviewer a crisp record of why the change matters.

acceptance_criteria:
  - criterion: "ConfigMap defines user-api-url=games-labs-user-service:50055 and missions-api-url=games-labs-missions-service:50056 by default."
  - criterion: "Deployment maps those ConfigMap keys to USER_API_URL and MISSIONS_API_URL in the game container."
  - criterion: "Deploy workflow creates/applies both keys and supports GitHub Secrets overrides."
  - criterion: ".env.example aligns with the same runtime defaults."
  - criterion: "Reviewer verifies the root cause explains the previously unfiltered authenticated ListGame behavior."
  - criterion: "Reviewer verifies no unrelated logic changes are bundled in this follow-up."

plan:
  approach: |
    (1) Inspect the already-landed runtime/config changes in Games-Labs-Game.

    (2) Verify the chain end to end: ConfigMap defaults -> Deployment env injection ->
        deploy workflow ConfigMap apply -> local .env example.

    (3) Document any rollout caveat, such as secrets overrides or the need for restart,
        then hand off to reviewer for final acceptance.
  subtasks:
    - order: 1
      id: "verify-runtime-manifests"
      description: >
        Confirm ConfigMap and Deployment both carry USER_API_URL and MISSIONS_API_URL
        with the intended in-cluster defaults and env mappings.
      agent: devops
      owned_files:
        - "Games-Labs-Game/k3s/configmap.yaml"
        - "Games-Labs-Game/k3s/deployment.yaml"
      parallel_safe: false
    - order: 2
      id: "verify-deploy-workflow"
      description: >
        Confirm the GitHub deploy workflow applies both ConfigMap keys, supports GitHub
        Secrets overrides, and restarts the deployment after apply.
      agent: devops
      owned_files:
        - "Games-Labs-Game/.github/workflows/deploy.yml"
      parallel_safe: false
    - order: 3
      id: "verify-doc-alignment"
      description: >
        Confirm .env.example matches the runtime defaults and note any operational caveat
        that should be preserved in reviewer output.
      agent: devops
      owned_files:
        - "Games-Labs-Game/.env.example"
      parallel_safe: false
    - order: 4
      id: "review-runtime-wiring"
      description: >
        Reviewer validates that the runtime fix addresses the original symptom and that
        the scoped change is limited to env wiring and deploy hardening.
      agent: reviewer
      owned_files: []
      parallel_safe: false
  risks:
    - risk: "A future deploy updates Deployment but forgets ConfigMap or workflow keys."
      mitigation: "Keep all three surfaces in one task scope and reviewer checklist."
    - risk: "Cluster defaults and local examples drift apart."
      mitigation: "Explicitly compare .env.example with k3s defaults."
    - risk: "People assume code logic was wrong instead of runtime env being absent."
      mitigation: "Capture root cause clearly in task background and reviewer summary."
  estimated_complexity: small

assignment:
  primary: dev-2
  parallel: false
  reason: >
    This is an operational wiring and deploy verification task rather than a new feature:
    the code/config change already exists, and the next step is to verify the runtime
    contract and hand off a clean review trail.

summary: |
  TASK-064 tracks the runtime env fix for Games-Labs-Game after debugging showed that
  USER_API_URL was missing in cluster, causing authenticated ListGame to behave like a
  guest request. The repo now carries defaults and env injection for both USER_API_URL
  and MISSIONS_API_URL across k3s manifests, deploy workflow, and .env.example. DevOps
  should verify the chain and hand off to reviewer.

