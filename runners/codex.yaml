runner:
  id: codex
  name: Codex CLI
  type: cli

invocation:
  command: codex
  args:
    - "--ask-for-approval"
    - "never"
    - "--quiet"
  prompt_flag: "-p"
  workdir_flag: "--cd"

capabilities:
  file_read: true
  file_write: true
  shell_exec: true
  git_ops: true
  multi_turn: true

limits:
  timeout_seconds: 300
  max_output_tokens: 16384

health_check:
  command: "codex --version"
  expect_exit_code: 0

notes: |
  Codex session MCP tool exposure is controlled by the host session, not by this workspace.
  Backend SocratiCode capabilities may exist even when specific MCP tools are not exposed in a given Codex session.
  When a required SocratiCode capability is missing from the Codex-exposed tool surface, use the local `socraticode` CLI wrapper as the fallback path.
