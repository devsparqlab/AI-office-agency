summary: |
  Completed TASK-043 against the current checkout by hardening the remaining high-risk edge case and extending coverage rather than reworking already-landed scaffolding. The shared-lib claim RPC, generated artifacts, Missions HTTP/gRPC wiring, repository transaction, migration guardrail, and Postman request were already present; I verified that path and then fixed the in-memory fallback so concurrent retries cannot double-credit when the service is running without a DB-backed repository.

  Added focused event-claim regression coverage for deterministic retry behavior and concurrent in-memory claims, and made the shared test wallet concurrency-safe so the concurrency assertions are stable. Compatibility assumption preserved intentionally: the persistent path still relies on the downstream wallet honoring the deterministic idempotency key if a credit succeeds but the local transaction fails before commit, which matches the existing weekly-claim safety model and keeps the change rollback-safe without broadening contracts.

