summary: |
  Added the additive Invite overview RPC to `missionspb` and regenerated the shared-lib gateway/gRPC/swagger artifacts for `GET /api/v1/missions/invite/overview`.
  Implemented a dedicated Missions invite overview service and handler that always returns a stable Invite tab payload with coming-soon defaults, plus fallback normalization for missing partial config/data without introducing any referral flow behavior.
  Wired the new endpoint into the Missions HTTP routes and gRPC mux dispatch, added focused service/handler tests for default and fallback behavior, and documented the request in the Postman collection.
