summary: |
  Extended shared-lib PlayerActivityEvent with optional spend_currency (THB when omitted),
  spend_category for classification, and games-labs-wallet source constant; added typed constants
  for THB/Diamond rails and consumption/refund/exchange categories.

  Games-Labs-Wallet: RabbitMQ PlayerActivity publisher (amq.topic / player.activity.v1), wired from
  cmd/main when RABBITMQ_URL works; walletsvc publishes spend.settled on successful Diamond debits
  (ledger-backed consumption only), and spend.reversed on Diamond credits when metadata
  reverses_wallet_ledger_id points at the original debit ledger id — package credits and exchange
  flows do not emit diamond spend missions. skip_player_activity metadata suppresses publish.

  Games-Labs-Missions: SPEND_DIAMOND_AMOUNT condition with admin validation (spend_currency fixed
  DIAMOND); mapper keys off effective spend currency (default THB for legacy Order events) and
  ignores spend_category=exchange; THB SPEND_AMOUNT no longer progresses from Diamond-tagged spend
  events. Consumer tests cover diamond forward/reverse, THB mismatch, and exchange category.

  Games-Labs-Order: explicit spend_currency=THB on THB spend.settled / spend.reversed.

  Docs: Games-Labs-Missions README (fifth template, matrices, examples); Games-Labs-Wallet README
  (publisher semantics, refund metadata, RABBITMQ_URL).

  go.mod pins for shared-lib were bumped to a placeholder pseudo-version; maintainer must replace
  with the real version from the shared-lib merge commit and run go mod tidy (see blockers).

