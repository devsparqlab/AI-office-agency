summary: |
  Implemented TASK-053 verification for game-based Daily Missions. Added a focused Missions consumer test proving one `round.settled` event increments only the configured exact `ROUND_COUNT_GAME` rule and matching `ROUND_COUNT_GAME_TYPE` rule, while ignoring non-matching game_id, non-matching game_type, and turnover rules.

  Added a Game-Based Daily Mission QA checklist to the Missions README. The docs state that launch alone must not progress missions, settlement must publish `round.settled` with `round_count=1`, and no `ROUND_COUNT_ANY` or any-game behavior exists in this phase.
artifacts:
  - path: Games-Labs-Missions/internal/services/daily_activity_consumer_test.go
    action: modified
  - path: Games-Labs-Missions/README.md
    action: modified
verification:
  - command: go test ./internal/services -run 'TestHandlePlayerActivityEvent_.*Round|TestHandlePlayerActivityEvent_AppliesSpendAmount'
    working_dir: Games-Labs-Missions
    result: passed
  - command: go test ./...
    working_dir: Games-Labs-Missions
    result: passed
next_action:
  agent: reviewer
  reason: "Round-count mission behavior is covered by focused tests and full service tests."
