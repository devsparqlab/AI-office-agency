summary: |
  Implemented TASK-056 complete-all-daily bonus: migration 021 adds mission_config columns and
  daily_completion_bonus_claims (unique user_id + bangkok_day); MissionConfig/repo load-update;
  eligibility helper matching active standalone + active grouped children; ClaimDailyCompletionBonus
  with insert-first idempotency and wallet compensation on failure; QuestOverview.daily_completion_bonus
  separate from monthly bonus_reward; GET progress exposes daily_completion_bonus_claimed; HTTP and
  missions.proto RPC POST /api/v1/missions/claim-daily-completion-bonus; grpc dispatch including
  ClaimDailyMissionGroup; admin/mission config handlers merge daily-completion keys via JSON map for
  partial toggles; README + Postman. Generated shared-lib *.pb.go are excluded by .cursorignore — run
  `make buf` in shared-lib before release so grpc-gateway and interface stay aligned.

