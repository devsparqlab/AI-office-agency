description: |
  Add user-aware playability metadata and a filtered authenticated user-game line
  so FE/Mobile can both browse the full catalog and request only currently playable
  games without duplicating Golden Pass rules client-side.

  Delivered behavior:
  - keep ListGame as a discoverability-first list and annotate games when authenticated,
  - add ListUserGame as the filtered authenticated list at /api/v1/game/my-games,
  - keep ListCategory public and annotate games there as well,
  - when no authenticated user context exists, return unknown/null metadata on
    discoverability endpoints,
  - keep LaunchGame as final enforcement.

  AGENTS.md policy applied here: because this change added new cross-service proto/types
  in shared-lib, implementation stopped after the shared-lib change and resumed only after
  the user published/bumped shared-lib.

acceptance_criteria:
  - criterion: "shared-lib gamepb.Game and gamepb.CategoryGame include optional is_playable and playability_reason; generated artifacts are updated."
  - criterion: "ListUserGame is exposed at GET /api/v1/game/my-games."
  - criterion: "ListGame remains a discoverability list and does not filter out locked games."
  - criterion: "ListCategory remains a public catalog and does not filter out locked games."
  - criterion: "Guest ListGame/ListCategory returns null playability metadata."
  - criterion: "Authenticated ListGame/ListCategory uses the same Golden Pass effective_max rule as LaunchGame."
  - criterion: "ListUserGame returns only playable games for the authenticated user."
  - criterion: "Locked games return is_playable=false and playability_reason=level_locked."
  - criterion: "User lookup failure does not fail ListGame/ListCategory and returns null metadata."
  - criterion: "Missions pass/config failure falls back to normal user-level evaluation only."
  - criterion: "LaunchGame behavior remains unchanged."
  - criterion: "Games-Labs-Game uses a published shared-lib version with no committed replace."
  - criterion: "README is updated, and any remaining focused test or external API doc gaps are called out explicitly."

plan:
  approach: |
    (1) Update shared-lib gamepb.Game and gamepb.CategoryGame with optional playability
        metadata, add ListUserGame, and regenerate artifacts.

    (2) Stop and wait for the user to publish / bump shared-lib. Do not implement
        downstream consumer changes before the published module exists.

    (3) Bump Games-Labs-Game to the published shared-lib version, then thread optional
        userid through ListGame/ListCategory for discoverability metadata and implement
        ListUserGame as the filtered authenticated line using shared Golden Pass helpers.

    (4) Add focused tests and update README where possible; if missing in the final tree,
        record the gap honestly in task artifacts.
  subtasks:
    - order: 1
      id: "shared-lib-user-game-playability-proto"
      description: >
        Add optional is_playable and playability_reason to gamepb.Game and
        gamepb.CategoryGame, add ListUserGame, and regenerate shared-lib artifacts.
        Stop after this subtask and ask the user to publish/bump shared-lib before continuing.
      agent: dev-2
      owned_files:
        - "shared-lib/proto/gamepb/game.proto"
        - "shared-lib/proto/gamepb/game.pb.go"
        - "shared-lib/proto/gamepb/game.pb.gw.go"
        - "shared-lib/proto/gamepb/game_grpc.pb.go"
        - "shared-lib/proto/gamepb/game.swagger.json"
        - "shared-lib/proto/gamepb/swagger.pb.go"
      parallel_safe: false
    - order: 2
      id: "game-user-game-playability"
      description: >
        After published shared-lib is available, bump Games-Labs-Game to that module
        version and implement discoverability metadata on ListGame/ListCategory plus
        the filtered authenticated ListUserGame endpoint.
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/go.mod"
        - "Games-Labs-Game/go.sum"
        - "Games-Labs-Game/internal/models/game.go"
        - "Games-Labs-Game/internal/models/category.go"
        - "Games-Labs-Game/internal/core/ports/services.go"
        - "Games-Labs-Game/internal/core/services/gamesvc/service.go"
        - "Games-Labs-Game/internal/core/services/gamesvc/level_access.go"
        - "Games-Labs-Game/internal/core/handlers/gamehdl/grpc.go"
      parallel_safe: false
    - order: 3
      id: "docs-and-tests"
      description: >
        Add or restore focused playability tests for ListGame/ListUserGame/ListCategory,
        document endpoint roles and null semantics in README, and verify LaunchGame
        behavior is unchanged.
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/README.md"
      parallel_safe: false
    - order: 4
      id: "review-user-game-playability"
      description: >
        Reviewer verifies shared-lib publish/bump sequencing was honored, consumer
        go.mod has no replace, ListGame/ListUserGame/ListCategory semantics match the
        delivered API split, and any remaining test/documentation gaps are recorded.
      agent: reviewer
      owned_files: []
      parallel_safe: false
  risks:
    - risk: "Downstream Game work starts before shared-lib is published, forcing forbidden local replacement types or replace directives."
      mitigation: "Make publish/bump a mandatory stop between subtask 1 and subtask 2."
    - risk: "Clients misread null as locked."
      mitigation: "Document null as not evaluated and reserve false for evaluated lock states only."
    - risk: "ListGame/ListUserGame/ListCategory semantics drift or are documented inconsistently."
      mitigation: "Reuse existing Golden Pass helpers, document the split explicitly, and keep task artifacts aligned to shipped behavior."
  estimated_complexity: medium

assignment:
  primary: dev-2
  parallel: false
  reason: >
    Cross-service contract tweak plus user-aware Games-Labs-Game response behavior,
    with explicit publish/bump sequencing required by AGENTS.md.

summary: |
  TASK-063 follows TASK-062 by splitting game-list responsibilities more clearly:
  ListGame and ListCategory remain discoverability-first and can expose playability
  metadata, while ListUserGame provides a filtered authenticated list at
  /api/v1/game/my-games. shared-lib owns the additive response contract fields and
  new endpoint; Games-Labs-Game reuses the existing Golden Pass access rule across
  all three lines.

