task:
  id: "TASK-053"
  title: "Enable ROUND_COUNT Daily Missions"
  short_name: "round-count-daily-missions"
  parent: "TASK-052"
  epic: "Mobile Missions integration"
  type: feature
  priority: high
  created_at: "2026-05-18"
scope:
  target_services:
    - service: Games-Labs-Missions
      reason: "Owns Daily Activity condition mapping, progress persistence, overview, claim-daily, tests, and docs."
    - service: docs
      reason: "Needs QA guidance for game-based Daily Missions."
description: |
  Verify and document game-based Daily Activities for configured exact `game_id` and configured `game_type`; do not add any-game behavior.
acceptance_criteria:
  - criterion: "ROUND_COUNT_GAME progresses only for matching game_id."
  - criterion: "ROUND_COUNT_GAME_TYPE progresses only for matching game_type."
  - criterion: "No ROUND_COUNT_ANY or any-game behavior is introduced."
  - criterion: "QA docs include launch/settle/progress/claim flow."
plan:
  approach: |
    Missions already contains the ROUND_COUNT_GAME and ROUND_COUNT_GAME_TYPE mapping. Add focused consumer coverage and docs to make the contract explicit.
  subtasks:
    - order: 1
      id: "round-count-consumer-tests"
      description: "Add a consumer test proving one round.settled event only applies to matching game_id and matching game_type rules."
      agent: dev-2
      owned_files:
        - "Games-Labs-Missions/internal/services/daily_activity_consumer_test.go"
      parallel_safe: false
    - order: 2
      id: "round-count-qa-docs"
      description: "Document launch not progressing, settlement progressing, claim, and duplicate-round expectations."
      agent: dev-2
      owned_files:
        - "Games-Labs-Missions/README.md"
      parallel_safe: false
  risks:
    - risk: "Product may ask for any-game missions later."
      mitigation: "Explicitly keep any-game out of this phase and document that no ROUND_COUNT_ANY exists."
  estimated_complexity: medium
assignment:
  primary: dev-2
  parallel: false
  reason: "Focused Missions tests and docs."
summary: |
  TASK-053 is ready for manual dev-2 implementation after TASK-052 core event behavior.
artifacts:
  - path: "runs/TASK-053/task.md"
    action: modified
  - path: "runs/TASK-053/status.yaml"
    action: modified
  - path: "runs/TASK-053/pm-output.yaml"
    action: created
next_action:
  agent: dev-2
  reason: "Implementation is scoped and ready."
context_sources:
  github:
    branch: ""
    pr: ""
  socraticode:
    status: fallback
    queries:
      - "HandlePlayerActivityEvent ROUND_COUNT_GAME ROUND_COUNT_GAME_TYPE round.settled"
    relevant_symbols:
      - "Games-Labs-Missions/internal/services/mission_service.go:mapPlayerActivityEventToDailyProgress"
      - "Games-Labs-Missions/internal/services/daily_activity_consumer_test.go"
    notes: "Local repo inspection confirmed existing round-count mapping."
blockers: []
