summary: |
  Added an additive admin missions RPC and HTTP route for `POST /api/v1/admin/missions/daily/reset`, regenerated the `missionspb` artifacts, and wired the Missions gRPC dispatcher and HTTP admin handler to it.

  In `Games-Labs-Missions`, I implemented a repository-backed reset path that deletes only the current Bangkok-day `daily_mission` and `watch_ad` mission logs plus current-day `daily_activity_progress`, while intentionally preserving weekly/monthly/invite/event state and the daily activity consumer event history. Preserving the consumer event history is the safer rollback-compatible choice here because late reverse events can still reconcile cleanly without us erasing the source event ledger.

  I also clear the in-memory daily counters/claim markers used by fallback mode so repeat calls stay stable, then added focused tests for missing `user_id`, repeat-safe reset behavior, Bangkok-day windowing, and non-impact on monthly state. No direct `api-gateway` source edit was needed because the existing gateway registration already serves the regenerated Missions grpc-gateway bindings and Swagger output.
