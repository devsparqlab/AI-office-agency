description: |
  Add user-aware playability metadata to the public ListCategory catalog so FE/Mobile
  can show whether each game is currently playable without hiding locked games or
  duplicating Golden Pass rules client-side.

  Chosen product behavior:
  - keep ListCategory as a public catalog,
  - return all games as today,
  - when no authenticated user context exists, return unknown/null metadata,
  - when authenticated, annotate each game with is_playable and optional
    playability_reason using the same effective_max rule as TASK-062,
  - keep LaunchGame as final enforcement.

  AGENTS.md policy applies here: because this change adds new cross-service proto/types
  in shared-lib, implementation must stop after the shared-lib change and wait for the
  user to publish/bump shared-lib before proceeding to Games-Labs-Game.

acceptance_criteria:
  - criterion: "shared-lib gamepb.CategoryGame includes optional is_playable and playability_reason; generated artifacts are updated."
  - criterion: "ListCategory remains a public catalog and does not filter out locked games."
  - criterion: "Guest ListCategory returns null playability metadata."
  - criterion: "Authenticated ListCategory uses the same Golden Pass effective_max rule as List and LaunchGame."
  - criterion: "Locked games return is_playable=false and playability_reason=level_locked."
  - criterion: "User lookup failure does not fail ListCategory and returns null metadata."
  - criterion: "Missions pass/config failure falls back to normal user-level evaluation only."
  - criterion: "LaunchGame behavior remains unchanged."
  - criterion: "Games-Labs-Game uses a published shared-lib version with no committed replace."
  - criterion: "README and tests are updated."

plan:
  approach: |
    (1) Update shared-lib gamepb.CategoryGame with optional playability metadata and
        regenerate artifacts.

    (2) Stop and wait for the user to publish / bump shared-lib. Do not implement
        downstream consumer changes before the published module exists.

    (3) Bump Games-Labs-Game to the published shared-lib version, then thread optional
        userid through ListCategory and annotate category games with guest-unknown or
        authenticated playability metadata using shared Golden Pass helpers.

    (4) Add focused tests for guest, authenticated no-pass, authenticated Golden Pass,
        and failure paths; update README and verify no replace directive remains.
  subtasks:
    - order: 1
      id: "shared-lib-category-playability-proto"
      description: >
        Add optional is_playable and playability_reason to gamepb.CategoryGame and
        regenerate shared-lib artifacts. Stop after this subtask and ask the user to
        publish/bump shared-lib before continuing.
      agent: dev-2
      owned_files:
        - "shared-lib/proto/gamepb/game.proto"
        - "shared-lib/proto/gamepb/game.pb.go"
        - "shared-lib/proto/gamepb/game.pb.gw.go"
        - "shared-lib/proto/gamepb/game_grpc.pb.go"
        - "shared-lib/proto/gamepb/game.swagger.json"
        - "shared-lib/proto/gamepb/swagger.pb.go"
      parallel_safe: false
    - order: 2
      id: "game-category-annotation"
      description: >
        After published shared-lib is available, bump Games-Labs-Game to that module
        version and implement user-aware ListCategory annotation without filtering.
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/go.mod"
        - "Games-Labs-Game/go.sum"
        - "Games-Labs-Game/internal/models/category.go"
        - "Games-Labs-Game/internal/core/ports/services.go"
        - "Games-Labs-Game/internal/core/services/gamesvc/service.go"
        - "Games-Labs-Game/internal/core/services/gamesvc/level_access.go"
        - "Games-Labs-Game/internal/core/handlers/gamehdl/grpc.go"
      parallel_safe: false
    - order: 3
      id: "tests-and-readme"
      description: >
        Add focused ListCategory playability tests, document null semantics in README,
        and verify LaunchGame behavior is unchanged.
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/internal/core/services/gamesvc/service_golden_pass_test.go"
        - "Games-Labs-Game/README.md"
      parallel_safe: false
    - order: 4
      id: "review-category-playability"
      description: >
        Reviewer verifies shared-lib publish/bump sequencing was honored, consumer go.mod
        has no replace, ListCategory preserves public-catalog semantics, and tests pass.
      agent: reviewer
      owned_files: []
      parallel_safe: false
  risks:
    - risk: "Downstream Game work starts before shared-lib is published, forcing forbidden local replacement types or replace directives."
      mitigation: "Make publish/bump a mandatory stop between subtask 1 and subtask 2."
    - risk: "Clients misread null as locked."
      mitigation: "Document null as not evaluated and reserve false for evaluated lock states only."
    - risk: "ListCategory playability drifts from List/LaunchGame."
      mitigation: "Reuse existing Golden Pass helpers and evaluate request-level state once."
  estimated_complexity: medium

assignment:
  primary: dev-2
  parallel: false
  reason: >
    Cross-service contract tweak plus user-aware Games-Labs-Game response behavior,
    with explicit publish/bump sequencing required by AGENTS.md.

summary: |
  TASK-063 follows TASK-062 by keeping ListCategory public while adding optional
  per-game playability metadata for authenticated clients. shared-lib owns the
  response contract fields; Games-Labs-Game annotates games using the existing
  Golden Pass access rule and returns null metadata for guests or unknown user
  context. Implementation must pause after shared-lib until the user publishes
  and bumps the new module version.

