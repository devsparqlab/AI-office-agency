task:
  id: "TASK-035"
  title: "1UP seamless invalid player should return ERR_USER_NOT_FOUND"
  short_name: "oneup-invalid-player-user-not-found"
  parent: "TASK-035"
  epic: "Seamless API Testing"
  type: bugfix
  priority: high
  created_at: "2026-05-05"

scope:
  target_services:
    - service: Games-Labs-Provider
      reason: "Owns 1UP seamless HTTP callbacks and is returning ERR_GAME_NOT_FOUND for invalid player rows that CSV v3 expects as ERR_USER_NOT_FOUND."
  affected_files:
    - path: Games-Labs-Provider/internal/handlers/providerhdl/oneup_runtime.go
      action: modify
      description: "Remove or adjust invalid-player classification so invalid player rows map back to ERR_USER_NOT_FOUND while invalid game rows still map to ERR_GAME_NOT_FOUND."
    - path: Games-Labs-Provider/internal/handlers/providerhdl/oneup_callback.go
      action: modify
      description: "Wire handler flow consistently with corrected invalid-player semantics."
    - path: Games-Labs-Provider/internal/handlers/providerhdl/oneup_callback_test.go
      action: modify
      description: "Update focused tests to assert ERR_USER_NOT_FOUND for invalid player rows and keep ERR_GAME_NOT_FOUND for invalid game rows."
    - path: ai-dev-office/runs/TASK-035/task.md
      action: modified
      description: "Corrected task blueprint aligned to CSV v3 expected results."
    - path: ai-dev-office/runs/TASK-035/status.yaml
      action: modified
      description: "Workflow reopened for iteration 2."
    - path: ai-dev-office/runs/TASK-035/pm-output.yaml
      action: modified
      description: "PM handoff updated for corrected acceptance criteria."

description: |
  CSV v3 shows that invalid player scenarios (tc01004, tc02004, tc03010, tc04004)
  are currently failing because the implementation returns ERR_GAME_NOT_FOUND, while
  the Expected Result column requires ERR_USER_NOT_FOUND. Invalid game scenarios
  (tc01005, tc02005, tc03011, tc04005) should continue returning ERR_GAME_NOT_FOUND.

acceptance_criteria:
  - criterion: "Invalid player rows tc01004, tc02004, tc03010, tc04004 return 404 ERR_USER_NOT_FOUND."
  - criterion: "Invalid game rows tc01005, tc02005, tc03011, tc04005 remain 404 ERR_GAME_NOT_FOUND."
  - criterion: "Valid success, invalid signature, invalid session, duplicate bet, invalid bet, and insufficient balance flows remain unchanged."
  - criterion: "go test ./internal/handlers/providerhdl/... passes."
  - criterion: "go test ./... passes in Games-Labs-Provider."

plan:
  approach: |
    Remove the non-UUID playerID shortcut introduced from the earlier CSV misread and
    restore classification based on the callback/session path so invalid player rows
    land on ERR_USER_NOT_FOUND again. Keep invalid game detection intact for the four
    invalid game rows. Update tests to match the corrected matrix.
  subtasks:
    - order: 1
      description: Remove or relax the non-UUID playerID gate from the four seamless handlers.
      agent: dev
    - order: 2
      description: Adjust runtime classification so invalid player returns ERR_USER_NOT_FOUND and invalid game remains ERR_GAME_NOT_FOUND.
      agent: dev
    - order: 3
      description: Update focused handler tests for the eight CSV rows and rerun provider tests.
      agent: dev
  risks:
    - risk: "Fixing invalid player could regress invalid game if the classification still relies on ambiguous missing-session signals."
      mitigation: "Test the four invalid player rows and four invalid game rows together and keep success/session/balance edge cases unchanged."
  estimated_complexity: medium

assignment:
  primary: dev
  parallel: false
  reason: "Single-service behavior correction with focused tests."

summary: |
  TASK-035 iteration 2 corrects the task interpretation itself: CSV v3 expects
  ERR_USER_NOT_FOUND for invalid player rows and ERR_GAME_NOT_FOUND for invalid
  game rows. Dev should adjust the 1UP callback classification accordingly and
  keep the rest of the seamless matrix stable.

artifacts:
  - path: ai-dev-office/runs/TASK-035/task.md
    action: modified
