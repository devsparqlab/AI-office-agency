      - internal/services/quest_overview_service.go
      - internal/handlers/mission_handler.go
      - internal/routes/apiv1.go
      - README.md
    details:
      - Added daily_activity_groups and daily_activity_group_members schema with membership validation.
      - Added DailyActivityGroup domain/runtime models and repository CRUD/list/member replacement.
      - Added parent progress derivation from active child DailyActivity completion.
      - Added grouped quest overview Daily items using kind=group and nested children.
      - Added POST /api/v1/missions/claim-daily-group with separate daily_mission_group mission logs and wallet credit.
      - Added admin /api/v1/admin/activity-groups routes for group CRUD, activation, and member replacement.
      - Updated Daily mission cap accounting to include child and parent group rewards.
  - service: api-gateway
