summary: |
  Validated and tightened AFB as the reference gameplay turnover lane without
  changing its payout-time semantics. The service now exposes a small test seam
  so focused tests can assert that Game `TrySettleRound` runs only after payout
  wallet transactions succeed.

  Added AFB service-level coverage for payout-time `SettleRound` after wallet
  success and wallet-failure skip. Turnover mapper tests now also cover top-
  level `valid_turnover` primary, transaction `valid_turnover` fallback, debit
  magnitude fallback, and zero/no-turnover behavior.

  README and verification evidence now include AFB-specific log grep patterns,
  wallet SQL, Game `round_lifecycles` SQL, Missions `turnover.settled`
  downstream checks, and a QA warning that `afb:bet:*` wallet rows alone do not
  progress Daily turnover until payout arrives.

  Verification:
  - `go test ./internal/core/services/afb`
  - `go test ./...`
  - `git diff --check`
