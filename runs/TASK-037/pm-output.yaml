task:
  id: "TASK-037"
  title: "Add VIP tiers API in User service"
  short_name: "vip-tiers-api"
  epic: "Quest + VIP overview phase 1"
  type: feature
  priority: high
  created_at: "2026-05-06"
scope:
  target_services:
    - service: shared-lib
      reason: "Additive userpb contract for VIP tier catalog."
    - service: Games-Labs-User
      reason: "Owner of VIP/Game level tier source of truth."
    - service: docs
      reason: "Postman collection must expose the new endpoint for downstream teams."
  affected_files:
    - path: "shared-lib/proto/userpb/userpb.proto"
      action: modify
      description: "Add ListVipTiers RPC and response messages."
    - path: "Games-Labs-User/internal/models/user.go"
      action: modify
      description: "Add VIP tier model and deterministic presentation presets."
    - path: "Games-Labs-User/internal/core/services/usersvc/service.go"
      action: modify
      description: "Implement ListVipTiers mapping from level_configs plus presets."
    - path: "Games-Labs-User/internal/core/handlers/userhdl/vip_handler.go"
      action: create
      description: "Expose HTTP GET /vip/tiers."
    - path: "Games-Labs-User/internal/core/handlers/userhdl/grpc.go"
      action: modify
      description: "Expose gRPC ListVipTiers."
    - path: "Games-Labs-User/cmd/main.go"
      action: modify
      description: "Register the HTTP VIP tiers route."
    - path: "docs/Games-Labs-APIs.postman_collection.json"
      action: modify
      description: "Add GET /api/v1/vip/tiers request."
description: |
  Add a User-owned VIP tiers catalog endpoint for Mobile/Frontend. The endpoint must use existing level_configs for thresholds and games availability, merged with deterministic presentation presets in code for phase 1.
acceptance_criteria:
  - criterion: "GET /api/v1/vip/tiers is defined only in userpb/Games-Labs-User, not missionspb/Games-Labs-Missions."
  - criterion: "ListVipTiers returns 200 with a tiers array and handles empty level_configs as tiers: []."
  - criterion: "Focused service and handler tests pass."
  - criterion: "Postman collection includes the new request."
plan:
  approach: |
    Add the userpb contract, regenerate code, implement User service mapping and handlers, then add focused tests and Postman coverage.
  subtasks:
    - order: 1
      description: "Update userpb contract and regenerate generated artifacts."
      agent: dev
    - order: 2
      description: "Implement User service model, presets, mapping, HTTP route, and gRPC handler."
      agent: dev
    - order: 3
      description: "Add focused tests and Postman request."
      agent: dev
  risks:
    - risk: "Route conflict if Missions also claims /api/v1/vip/tiers."
      mitigation: "Acceptance criteria explicitly forbids adding the path outside User."
    - risk: "Generated files drift."
      mitigation: "Use proto generation tooling and review generated artifacts."
  estimated_complexity: medium
assignment:
  primary: dev
  parallel: false
  reason: "Focused mostly in User service plus shared contract."
summary: |
  Created TASK-037 for Card A of quest-vip-overview phase 1: a User-owned VIP tiers API.
artifacts:
  - path: "runs/TASK-037/task.md"
    action: created
  - path: "runs/TASK-037/status.yaml"
    action: created
next_action:
  agent: dev
  reason: "Task is scoped and ready for implementation."
