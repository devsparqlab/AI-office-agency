summary: |
  Implemented a shared Daily reset policy for Games-Labs-Missions and wired the same policy into the mission service and quest overview countdown so QA can opt into short reset windows in local/dev without changing the production default.

  The default remains calendar-based reset at 00:00 Asia/Bangkok. A new DEV-only env config (`DAILY_RESET_MODE`, `DAILY_RESET_INTERVAL_MINUTES`) now enables interval-mode only when `APP_ENV` is local/dev; staging and production-like environments are forced back to the default calendar policy.

  To keep the change rollback-safe and avoid schema churn in date-backed tables, the override is applied to the bucketed Daily mission/watch-ad windows and the overview Daily countdown, which are the surfaced QA-reset paths in scope. Existing monthly and streak persistence remains on its prior calendar-date storage model.
