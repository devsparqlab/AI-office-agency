task:
  id: "TASK-046"
  title: "Add admin force-reset for daily missions per user"
  short_name: "admin-daily-force-reset"
  parent: "TASK-042"
  epic: "Mission QA acceleration for Mobile and DEV"
  type: feature
  priority: high
  created_at: "2026-05-11"
scope:
  target_services:
    - service: shared-lib
      reason: "Add additive admin missions contract for daily reset by user."
    - service: Games-Labs-Missions
      reason: "Owns Daily progress, claim state, and reset behavior."
    - service: api-gateway
      reason: "Expose the admin route through the gateway if the current mapping requires changes."
    - service: docs
      reason: "Postman collection should document the admin QA flow."
description: |
  Add an admin-only endpoint to force-reset one user's current-day Daily mission state on DEV so Mobile QA can rerun Daily scenarios immediately without waiting for the natural Bangkok-midnight reset.
acceptance_criteria:
  - criterion: "Admin endpoint exists for POST /api/v1/admin/missions/daily/reset."
  - criterion: "Reset clears only Daily-related current-day state for the specified user."
  - criterion: "Repeated reset calls are stable and do not corrupt state."
  - criterion: "Weekly, monthly, invite, and event state remain unchanged."
  - criterion: "Focused tests and Postman coverage are added."
plan:
  approach: |
    Add a narrow repository-backed admin reset path for the current Bangkok-day Daily bucket, keeping the implementation explicit and isolated from other mission domains.
  subtasks:
    - order: 1
      description: "Inspect Daily progress persistence and enumerate Daily-only state that must reset together."
      agent: dev-2
    - order: 2
      description: "Add contract, repository/service reset behavior, and admin route wiring."
      agent: dev-2
    - order: 3
      description: "Add focused tests and Postman admin request with QA guidance."
      agent: dev-2
  risks:
    - risk: "Partial reset leaves QA with inconsistent Daily state."
      mitigation: "Reset all Daily-owned current-day state behind one service boundary and verify with tests."
    - risk: "Reset accidentally affects non-Daily mission domains."
      mitigation: "Add explicit non-impact checks for weekly/monthly/event state."
  estimated_complexity: medium
assignment:
  primary: dev-2
  parallel: false
  reason: "Cross-cutting Daily state reset needs careful persistence and contract handling."
summary: |
  Created TASK-046 to add an admin-only per-user Daily reset path for faster Mobile QA on DEV.
artifacts:
  - path: "runs/TASK-046/task.md"
    action: created
  - path: "runs/TASK-046/status.yaml"
    action: created
next_action:
  agent: dev-2
  reason: "Task is scoped and ready."
blockers: []
