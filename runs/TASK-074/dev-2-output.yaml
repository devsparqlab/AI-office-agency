summary: |
  Validated Sigma as a provider-specific turnover lane without overstating E2E
  readiness. The service now exposes a small `trySettleRoundHook` seam so
  focused tests can assert that Game `SettleRound` only fires on
  `DebitAndCredit`/`Credit` when `isEndRound=true`, and on `ArcadeSettle`,
  while `Cancel` stays wallet-only.

  Tightened Sigma coverage across the service and turnover mapper. Tests now
  cover debit-to-turnover mapping, zero-debit omission, `roundId` primary with
  `txId` fallback, end-round gating, `ArcadeSettle` forwarding, and
  `Cancel` no-settlement behavior.

  Updated the Provider README and TASK-074 verification evidence to state the
  crucial runtime caveat clearly: Sigma's `walletOp` path in the current
  service is still a stub returning balance `0`, so this task is a local hook
  validation plus explicit E2E deferral, not a staging sign-off.

  Verification:
  - `go test ./internal/core/services/sigma ./internal/handlers/sigmahdl`
  - `go test ./...`
  - `git diff --check`
