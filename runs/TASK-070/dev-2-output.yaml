summary: |
  Moved IDG gameplay turnover production from win-time Redis stake lookup to bet-debit
  settlement. IntegratorBet now calls Game SettleRound via trySettleRoundHook only after
  IDGDebitWallet succeeds, using wagerId, userId, gameId, provider_code=idg, and parsed
  Amount as settled_amount. IntegratorWin no longer calls SettleRound (Game round_lifecycles
  insert gate prevents double-count if a legacy path retried). Removed Redis wager/txn stake
  cache and idgWinTurnover; turnover.go now exposes idgBetSettledAmount only.

  IDGCancel refunds wallet when amount > 0 but cannot reverse bet-time turnover: Game
  gamesvc.ReverseRound exists internally but shared-lib gamepb has no ReverseRound RPC and
  Provider gameadt has no reverse helper. Cancel logs an explicit staging blocker message;
  verification-evidence.md documents SQL/log checks and the staging gate.

  Unit tests cover bet success settle, debit failure skip, win no double-settle, cancel no
  settle, and amount mapping. go test ./internal/core/services/idg ./internal/handlers/idghdl
  and go test ./... pass in Games-Labs-Provider.
