    - path: "Games-Labs-Game/README.md"
      action: modify
      description: "Formula, env, cache, fail-safe behavior."

description: |
  Make Golden Pass game-level unlock admin-tunable instead of a hardcoded +11 offset.

  Baseline already delivers pass ownership checks and List/Launch gating via Missions
  HasActivePass. This task adds a dedicated Golden Pass *behavior* config (level_offset,
  max_game_level) separate from pass catalog (price/duration/active), exposes admin APIs,
  and teaches Game to compute:

    effective_max = max(user_level, min(user_level + level_offset, max_game_level))

  Fail-safe: any config/pass lookup failure falls back to normal user-level gating only.
  Game caches config for 60s; pass checks stay live.

  Assignee must gap-audit the workspace first — exploratory implementation may already
  exist for proto, migration, handlers, and Game adapter tests.

acceptance_criteria:
  - criterion: "mission_config stores golden_pass_level_offset and golden_pass_max_game_level with defaults 11 and 16."
  - criterion: "Admin GET/PUT /api/v1/admin/store/golden-pass/config works; PUT rejects invalid/zero/missing fields with 400."
  - criterion: "gRPC GetGoldenPassConfig returns current config; HasActivePass unchanged."
  - criterion: "Game List and LaunchGame share effective_max formula; fail-safe on config/pass errors."
  - criterion: "Game caches GetGoldenPassConfig 60s; expired refresh failure yields no bonus; HasActivePass not cached."
  - criterion: "Tests cover Missions admin/gRPC and Game formula, list, launch, cache paths."
  - criterion: "shared-lib regenerated; service go.mod uses locked shared-lib version; builds pass."

plan:
  approach: |
    (1) Land shared-lib proto + buf generate; bump module version in Missions and Game.

    (2) Missions: migration + repo/service + admin routes/handlers + gRPC GetGoldenPassConfig;
        validate both fields on PUT; document admin contract.

    (3) Game: extend Missions adapter (config cache TTL 60s); replace hardcoded offset in
        level_access; wire List/Launch through goldenPassState; document MISSIONS_API_URL.

    (4) Tests + README; reviewer verifies cross-service behavior and fail-safe paths.
  subtasks:
    - order: 1
      id: "shared-lib-golden-pass-proto"
      description: >
        Add GoldenPassConfigResponse, GetGoldenPassConfig, AdminGet/AdminUpdate golden-pass
        config to missions.proto; run make buf; publish/bump shared-lib for consumers.
      agent: dev-2
      owned_files:
        - "shared-lib/proto/missionspb/missions.proto"
      parallel_safe: false
    - order: 2
      id: "missions-golden-pass-config"
      description: >
        Migration, models, repo, mission service getters/updaters with validation, admin
        HTTP handlers/routes, missiongrpc GetGoldenPassConfig + MissionSvc wiring, tests.
      agent: dev-2
      owned_files:
        - "Games-Labs-Missions/migrations/022_golden_pass_access_config.sql"
        - "Games-Labs-Missions/internal/models/models.go"
        - "Games-Labs-Missions/internal/repositories/mission_repo.go"
        - "Games-Labs-Missions/internal/services/mission_service.go"
        - "Games-Labs-Missions/internal/handlers/admin_handler.go"
        - "Games-Labs-Missions/internal/routes/apiv1.go"
        - "Games-Labs-Missions/internal/grpc/missiongrpc/server.go"
        - "Games-Labs-Missions/cmd/main.go"
        - "Games-Labs-Missions/README.md"
      parallel_safe: false
    - order: 3
      id: "game-golden-pass-consumer"
      description: >
        Config-driven effective_max in gamesvc; missions adapter cache; List/Launch parity;
        MISSIONS_API_URL; unit tests for formula, list, launch, cache, fail-safe.
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/internal/core/ports/adapters.go"
        - "Games-Labs-Game/internal/adapters/missionsadt/adapter.go"
        - "Games-Labs-Game/internal/core/services/gamesvc/level_access.go"
        - "Games-Labs-Game/internal/core/services/gamesvc/service.go"
        - "Games-Labs-Game/configs/config.go"
        - "Games-Labs-Game/.env.example"
        - "Games-Labs-Game/README.md"
      parallel_safe: false
    - order: 4
      id: "review-golden-pass-access"
      description: >
        Reviewer: build/test both services; verify acceptance criteria and fail-safe;
        confirm go.mod has no replace; note ListCategory gap if still unfiltered.
      agent: reviewer
      owned_files: []
      parallel_safe: false
  risks:
    - risk: "Exploratory code in tree may duplicate work or drift from spec."
      mitigation: "Mandatory gap audit against acceptance criteria before coding."
    - risk: "shared-lib not bumped blocks CI compile."
      mitigation: "Subtask 1 completes proto publish and go.mod bumps before service work."
    - risk: "ListCategory may expose games above effective_max."
      mitigation: "Document deferral or add follow-up task after product confirms."
  estimated_complexity: medium

