  Approved. The change adds the admin daily-reset RPC and HTTP mapping, regenerates the `missionspb` artifacts, wires the Missions service/gRPC dispatch and admin handler, and documents the DEV QA flow in Postman.

  I verified the reset path clears current Bangkok-day `daily_mission` and `watch_ad` mission logs plus `daily_activity_progress`, while leaving non-daily domains unchanged. `GET /api/v1/missions/progress` and `GET /api/v1/quest/overview` read their affected daily counters from the surfaces this reset clears, and the focused tests cover missing `user_id`, repeat-safe behavior, Bangkok-day scoping, and non-impact on monthly state.

  I also checked the affected `go.mod` files and found no forbidden `replace github.com/SparqLab/shared-lib => ../shared-lib` directive.
