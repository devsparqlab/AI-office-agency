summary: |
  Implemented production mission event read APIs across shared-lib and Games-Labs-Missions.
  I added additive missionspb list/detail RPCs with grpc-gateway mappings, regenerated the missions protobuf artifacts, and wired new HTTP + gRPC dispatch for:
  - GET /api/v1/missions/events?user_id=...
  - GET /api/v1/missions/events/{event_id}?user_id=...

  On the Missions service side I introduced a DB-backed mission_events read model plus a small in-memory fallback seed, then added a dedicated EventService and EventHandler. Event list now returns only active-window events by default, while event detail returns a predictable payload for active, upcoming, expired, or inactive events. Status includes claimable, claimed, progress, reward, and state. Window evaluation is deterministic with start_at inclusive and end_at exclusive comparisons against absolute timestamps, and focused tests cover active/inactive/expired cases plus timezone normalization.

  I also added a migration/seed for the minimal read config path and updated the Postman collection with event list/detail requests. I intentionally did not add event claim in this task because there is not yet a verified duplicate-safe claim persistence flow for event rewards; the read API exposes claimed using the reserved mission_logs mission type so Phase 2.1 can add claim without changing the read contract.
