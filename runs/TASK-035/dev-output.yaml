summary: |
  Removed the non-UUID seamless playerID shortcut that was forcing the four CSV
  v3 invalid-player rows (`tc01004`, `tc02004`, `tc03010`, `tc04004`) to return
  `ERR_GAME_NOT_FOUND` before the normal session/player flow ran. The four 1UP
  callbacks now rely on the existing session/game classification path again,
  which restores `ERR_USER_NOT_FOUND` for invalid-player cases while preserving
  `ERR_GAME_NOT_FOUND` for invalid-game cases.

  Updated the focused handler tests to match the corrected acceptance matrix for
  all eight CSV rows, using `errOneUpInvalidSession` for invalid-player
  expectations and keeping `errOneUpGameNotFound` for invalid-game expectations.

  Validation:
  - `go test ./internal/handlers/providerhdl -count=1`
  - `go test ./...`
