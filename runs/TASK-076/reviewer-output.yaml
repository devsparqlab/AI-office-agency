summary: |
  Approved. TASK-076 now closes the remaining IDG cancel correctness gap in the
  gameplay turnover rail. The shared contract exposes `ReverseRound`, Game
  serves it through the existing reverse lifecycle path, and Provider calls it
  only after wallet refund succeeds. The new tests cover the RPC surface,
  one-time reverse event publishing, and the refund-success/refund-failure
  branches on the IDG cancel callback.

  I re-verified the shared-lib contract test, the full `Games-Labs-Game` and
  `Games-Labs-Provider` suites, both `GOWORK=off go build -mod=readonly ./...`
  checks, and `git diff --check` in every touched repo.
