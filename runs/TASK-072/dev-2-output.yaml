summary: |
  Validated and tightened the VP gameplay turnover lane around the existing
  `betnsettle` flow without changing the external callback contract. The service
  now exposes the same small test seam used by the IDG and 1UP lanes so focused
  tests can assert that Game `TrySettleRound` runs only after wallet-success
  settlement paths.

  Added VP service-level coverage for `betnsettle` success, `validBetAmt`
  primary with `actualBetAmt` fallback, wallet failure skip, and no forward
  settlement on `balance` / `rollback`. Mapper tests now also cover zero/no-
  positive turnover and round-id fallback behavior.

  README and verification evidence now include VP-specific log grep patterns,
  wallet SQL, Game `round_lifecycles` SQL, and Missions `turnover.settled`
  downstream checks. Rollback remains intentionally forward-settlement-free;
  there is no Game reverse contract wired for VP in this task.

  Verification:
  - `go test ./internal/core/services/vp ./internal/handlers/vphdl`
  - `go test ./...`
  - `git diff --check`
