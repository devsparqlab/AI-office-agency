        - Games-Labs-Wallet/infrastructure/rabbitmq.go
      parallel_safe: false
    - order: 3
      id: 057-missions-spend-diamond-condition
      description: Add SPEND_DIAMOND_AMOUNT validation, mapper, tests, and README; bump Missions shared-lib.
      agent: dev-2
      owned_files:
        - Games-Labs-Missions/internal/services/mission_service.go
        - Games-Labs-Missions/internal/repositories/mission_repo.go
        - Games-Labs-Missions/internal/services/daily_activity_consumer_test.go
        - Games-Labs-Missions/README.md
      parallel_safe: false
    - order: 4
      id: 057-order-explicit-thb-spend-currency
      description: Optional — set spend_currency THB on Order spend publishers and adjust tests.
      agent: dev-2
