      parallel_safe: false
  risks:
    - risk: Some Diamond debit paths omit publisher hooks and missions under-report.
      mitigation: Enumerate wallet debit/reversal call sites in review; acceptance checklist per product use case.
    - risk: Float amounts vs integer diamonds cause rounding drift.
      mitigation: Align units with wallet ledger and document rounding in README and tests.
