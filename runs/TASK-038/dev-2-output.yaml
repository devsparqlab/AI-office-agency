summary: |
  Added the additive `missionspb.GetQuestOverview` contract with grpc-gateway support for `GET /api/v1/quest/overview`, then regenerated the Missions protobuf, grpc, gateway, and swagger artifacts in `shared-lib` so the new route is wired end-to-end at the contract layer.

  In `Games-Labs-Missions`, I implemented a dedicated quest overview composition service and handler instead of overloading the existing claim/progress handlers. The overview uses existing Missions progress/config data for Daily and Monthly, keeps Weekly/Event/Invite as ordered inactive placeholders with empty `items`, and pulls the header level from User gRPC `GetProfile`. User lookup failures or non-200 profile responses degrade gracefully to `user.partial=true` while still returning a 200 overview payload.

  To stay rollback-safe and avoid inventing unsupported cross-service semantics, `next_level_progress` uses the only User fields currently available (`exp`, with `target=0`) rather than deriving a fake threshold. Validation used a temporary `go.work` linking local `shared-lib` and `Games-Labs-Missions` modules instead of adding a forbidden `replace`.
