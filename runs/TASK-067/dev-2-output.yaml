summary: |
  Implemented the Games-Labs-Missions check-in calendar runtime against the published TASK-066 shared-lib contract.
  Added durable check-in campaign, milestone, day ledger, milestone claim, and restore ledger persistence with unique constraints for idempotency.
  Added a focused check-in calendar service for calendar day status derivation, milestone eligibility/claiming, restore quote pricing, and restore debit recording.
  Wired Mobile HTTP routes, Backoffice config routes, typed gRPC methods, and quest overview's compact calendar endpoint reference while preserving existing monthly check-in behavior.
  The shared-lib dependency is pinned to v0.0.0-20260525172513-2504f03eefbc with no committed replace directive.
