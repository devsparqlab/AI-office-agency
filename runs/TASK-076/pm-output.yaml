task:
  id: "TASK-076"
  title: "IDG Cancel ReverseRound Turnover Reversal"
  short_name: "idg-cancel-reverse-round"
  parent: "TASK-069"
  epic: "Quest Daily Turnover / Provider Gameplay Settlement"
  type: bugfix
  priority: high
  created_at: "2026-06-01"
scope:
  target_services:
    - service: shared-lib
      reason: "Game ReverseRound needs a public gRPC contract before Provider can call it."
    - service: Games-Labs-Game
      reason: "Already has internal ReverseRound logic that must be exposed over gRPC."
    - service: Games-Labs-Provider
      reason: "IDGCancel currently refunds wallet but only logs that reverse is not wired."
    - service: ai-dev-office
      reason: "Needs task evidence and rollout sequencing notes."
  affected_files:
    - path: "shared-lib/proto/gamepb/game.proto"
      action: modify
      description: "Add internal ReverseRound RPC and messages."
    - path: "shared-lib/proto/gamepb/game.pb.go"
      action: modify
      description: "Regenerate protobuf types for ReverseRound."
    - path: "shared-lib/proto/gamepb/game_grpc.pb.go"
      action: modify
      description: "Regenerate gRPC client/server bindings for ReverseRound."
    - path: "Games-Labs-Game/internal/core/handlers/gamehdl/settle_round.go"
      action: modify
      description: "Expose ReverseRound alongside SettleRound in the gRPC handler surface."
    - path: "Games-Labs-Game/internal/core/handlers/gamehdl/settle_round_test.go"
      action: modify
      description: "Cover ReverseRound validation and idempotent success semantics."
    - path: "Games-Labs-Provider/internal/adapters/gameadt/settle_round.go"
      action: modify
      description: "Add ReverseRound adapter helper mirroring SettleRound logging/no-op rules."
    - path: "Games-Labs-Provider/internal/core/services/idg/callback.go"
      action: modify
      description: "Call ReverseRound from IntegratorCancel after successful refund."
    - path: "Games-Labs-Provider/internal/core/services/idg/callback_test.go"
      action: modify
      description: "Switch cancel coverage from no-settle expectation to refund-success reverse expectation."
    - path: "Games-Labs-Provider/README.md"
      action: modify
      description: "Document that IDG cancel now reverses gameplay turnover when wired."
    - path: "ai-dev-office/runs/TASK-076/verification-evidence.md"
      action: create
      description: "Record SQL/log checks for round_lifecycles.reversed_at and turnover.reversed."
description: |
  Wire the missing reverse path for IDG cancel so bet-time Daily turnover does not remain counted after a refunded/canceled wager. The Game service already has internal reverse lifecycle behavior and Missions already consumes turnover.reversed; the missing work is to add a shared-lib gRPC contract, expose that contract in Game, and call it from Provider after wallet refund succeeds.

  Because this task changes a shared cross-service proto, sequencing matters: publish the shared-lib contract first, bump downstream services to the new version, remove any local replace usage, and only then land the Game/Provider implementation.
acceptance_criteria:
  - criterion: "shared-lib/proto/gamepb exposes a gRPC-only ReverseRound RPC with regenerated bindings."
  - criterion: "Games-Labs-Game serves ReverseRound using the existing reverse lifecycle path and emits reverse events only on first reverse."
  - criterion: "Games-Labs-Provider calls ReverseRound from IDGCancel only after wallet refund succeeds and skips it when refund fails or required IDs are missing."
  - criterion: "Repeated IDGCancel callbacks for the same wager remain idempotent and do not double-reverse turnover."
  - criterion: "Docs/evidence show fresh cancel verification for round_lifecycles.reversed_at and daily_activity_consumer_events turnover.reversed."
  - criterion: "After shared-lib changes, downstream services run go mod tidy and pass GOWORK=off go build -mod=readonly ./... before merge."
plan:
  approach: |
    Treat this as a contract-completion task rather than a new business rule. Add the missing ReverseRound RPC to shared-lib first, then expose the already-implemented Game reverse service through gRPC, and finally replace the Provider warning-only IDGCancel path with a refund-success reverse call using the same no-op/log-only adapter style as SettleRound.
  subtasks:
    - order: 1
      id: "reverse-round-contract"
      description: "Add ReverseRound to shared-lib game proto, regenerate code, and prepare the publish/bump step."
      agent: dev-2
      owned_files:
        - "shared-lib/proto/gamepb/game.proto"
        - "shared-lib/proto/gamepb/game.pb.go"
        - "shared-lib/proto/gamepb/game_grpc.pb.go"
      parallel_safe: false
    - order: 2
      id: "game-reverse-grpc"
      description: "Expose Game ReverseRound over gRPC with validation and idempotent response coverage."
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/internal/core/handlers/gamehdl/settle_round.go"
        - "Games-Labs-Game/internal/core/handlers/gamehdl/settle_round_test.go"
        - "Games-Labs-Game/internal/core/services/gamesvc/service.go"
      parallel_safe: false
    - order: 3
      id: "provider-idg-cancel-reverse"
      description: "Add game adapter reverse helper, wire IDGCancel after wallet refund, and refresh docs/evidence."
      agent: dev-2
      owned_files:
        - "Games-Labs-Provider/internal/adapters/gameadt/adapter.go"
        - "Games-Labs-Provider/internal/adapters/gameadt/settle_round.go"
        - "Games-Labs-Provider/internal/core/services/idg/callback.go"
        - "Games-Labs-Provider/internal/core/services/idg/callback_test.go"
        - "Games-Labs-Provider/internal/handlers/idghdl/idg_callback.go"
        - "Games-Labs-Provider/README.md"
        - "ai-dev-office/runs/TASK-076/verification-evidence.md"
      parallel_safe: false
  risks:
    - risk: "Downstream services may compile against stale shared-lib bindings."
      mitigation: "Make publish/bump/build verification an explicit sequencing step before Game/Provider edits merge."
    - risk: "Duplicate cancel callbacks may look like errors to Provider callers."
      mitigation: "Treat already-reversed results as idempotent success and avoid failing the external callback path."
    - risk: "Historic canceled wagers remain over-counted."
      mitigation: "Document this task as forward-fix only and split any backfill into a separate follow-up."
  estimated_complexity: high
assignment:
  primary: dev-2
  parallel: false
  reason: "This is a cross-service contract change touching shared-lib, Game, and Provider in sequence."
summary: |
  TASK-076 closes the last known correctness gap in the IDG bet-time turnover rollout by wiring cancel/refund reversal end to end. The work is sequential because the shared-lib game proto must move first, then Game can expose ReverseRound, then Provider can invoke it from IDGCancel.
