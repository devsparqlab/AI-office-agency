    limit-per-player field.
- phase: in_progress (component scaffold built + typecheck-clean)
  agent: dev
  reason: >
    Added app/components/RedemptionItemCreateModal.vue — one parameterized wizard.
    Props: open (v-model), kind ('evoucher'|'gift'), brandOptions/tagOptions/vipOptions
    (parent owns fetching). Emits update:open + created. Steps driven by STEPS_BY_KIND
