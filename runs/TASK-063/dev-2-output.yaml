task_id: TASK-063
agent: dev-2
status: completed
completed_at: '2026-05-21T17:35:00+0700'

summary: |
  Implemented Golden Pass category playability metadata end to end.

  In shared-lib, `gamepb.CategoryGame` now exposes optional `is_playable` and
  `playability_reason` fields, with regenerated protobuf/OpenAPI artifacts. After
  the user published shared-lib, Games-Labs-Game was bumped to
  `github.com/SparqLab/shared-lib v0.0.0-20260521084502-88c071b64c68` and
  `ListCategory` was updated to remain a public catalog while annotating each
  game for authenticated users using the same Golden Pass access rule already
  used by `List` and `LaunchGame`.

  Guest `ListCategory` responses now leave playability metadata unset
  (`null`/unknown). Authenticated responses mark playable games with
  `is_playable=true` and locked games with `is_playable=false`,
  `playability_reason=level_locked`. User lookup failure returns the catalog
  with unknown metadata instead of failing the endpoint. `LaunchGame` behavior
  remains unchanged.

