summary: |
  Approved. TASK-053 adds focused Missions consumer coverage and operator QA docs for game-based
  Daily Activities. `TestHandlePlayerActivityEvent_AppliesRoundCountForMatchingGameAndTypeOnly`
  proves one `round.settled` event increments only `ROUND_COUNT_GAME` with matching `game_id` and
  `ROUND_COUNT_GAME_TYPE` with matching `game_type`, while ignoring other game_id, other game_type,
  and turnover rules. `mapPlayerActivityEventToDailyProgress` uses exact `game_id` equality and
  case-insensitive `game_type` matching; no `ROUND_COUNT_ANY` exists in code or docs.

  README **Game-Based Daily Mission QA Checklist** documents launch (no progress), settle/publish,
  quest/overview verification, claim-daily, and duplicate-round expectations. Mobile overview
  behavior relies on the existing `GetProgress` → `QuestOverviewService` path (not new HTTP tests
  in this task); consumer-level progress writes are sufficient for PM scope.
