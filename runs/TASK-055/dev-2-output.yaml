summary: |
  Implemented first-class Daily Activity parent groups for Mobile Daily missions.
  Children remain ordinary event-driven daily_activities; parent rows are stored in
  dedicated group tables, derive progress from child completion, and claim through
  a separate parent claim endpoint.

