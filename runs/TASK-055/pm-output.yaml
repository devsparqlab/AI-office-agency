task:
  id: TASK-055
  title: Daily Grouping / Parent Mission
  short_name: daily-parent-groups
  parent: TASK-049
  epic: Mobile Missions integration
  type: feature
  priority: medium
  created_at: '2026-05-18'

scope:
  target_services:
    - service: Games-Labs-Missions
      reason: >-
        Owns daily activities, consumer-driven progress, quest overview Daily tab,
        claim-daily flow, admin activity APIs, and PostgreSQL migrations for new group tables.
  affected_files:
    - path: Games-Labs-Missions/migrations/*.sql
      action: create
      description: New daily group + membership tables (and parent claim persistence if separate from children).
    - path: Games-Labs-Missions/internal/models/models.go
      action: modify
      description: Domain types for groups, nested overview items, parent progress/claim flags.
    - path: Games-Labs-Missions/internal/repositories/mission_repo.go
      action: modify
      description: Load groups/members; aggregate parent state from child daily progress.
    - path: Games-Labs-Missions/internal/services/mission_service.go
      action: modify
      description: Parent completion rules; parent claim + wallet/idempotency aligned with ClaimDailyMission.
    - path: Games-Labs-Missions/internal/services/quest_overview_service.go
      action: modify
      description: Daily tab grouped JSON for GET /api/v1/quest/overview.
    - path: Games-Labs-Missions/internal/services/quest_overview_service_test.go
      action: modify
      description: Tests for grouped overview shape.
    - path: Games-Labs-Missions/internal/handlers/mission_handler.go
      action: modify
      description: Parent claim request handling (extended claim-daily or new route).
    - path: Games-Labs-Missions/internal/routes/apiv1.go
      action: modify
      description: Register parent claim and admin group routes.
    - path: Games-Labs-Missions/README.md
      action: modify
      description: Schema, API JSON contract, admin/backoffice configuration story.
    - path: api-gateway/docs/Games-Labs-APIs.postman_collection.json
      action: modify
      description: Document overview + claim examples for grouped dailies.
    - path: shared-lib/proto/missionspb/missions.proto
      action: unchanged
      description: >-
        GetQuestOverview returns Struct; no RPC signature change expected unless explicit typed messages are introduced later.

description: |
  Add backend support for Daily “parent” missions backed by a dedicated group table linking to
  existing daily_activities as children. Child progress stays event-driven; parent progress is
  derived from child completion counts for the Bangkok daily window. Parent rewards use a separate
  claim flow from child rewards. GET /api/v1/quest/overview must return an explicit grouped structure
  so Mobile does not infer grouping client-side. Admin/backoffice configuration must be specified
  and preferably exposed via REST consistent with existing /api/v1/admin/activities patterns.

acceptance_criteria:
  - criterion: Migrations introduce group + membership tables without overloading daily_activities rows for parents.
  - criterion: Child daily progression and consumer pipelines behave as today (no regression in event application).
  - criterion: Parent progress exposed as completed_children/total_children consistent with existing completion semantics.
  - criterion: GET /api/v1/quest/overview Daily tab documents and returns nested parent/child structure additively for Mobile.
  - criterion: Parent claim credits configured reward once when eligible; rejects incomplete/double-claim/inactive with clear statuses.
  - criterion: GET /api/v1/missions/progress either matches grouped daily representation or documents single source of truth.
  - criterion: README defines admin operations (CRUD/list, validation, ordering) and implemented endpoints or approved interim seed path.
  - criterion: Automated tests cover overview grouping, parent aggregation, and parent claim guardrails.

plan:
  approach: |
    Introduce relational group tables referencing daily_activities. Load groups with daily progress
    queries; derive parent completion from child DailyActivity rows. Extend QuestOverview Daily tab
    with additive JSON (parent nodes + children). Implement parent claim in MissionService using the
    same wallet/idempotency patterns as ClaimDailyMission. Add admin HTTP routes for managing groups
    and membership; update README and Postman. missions.proto likely unchanged because overview uses Struct.
  subtasks:
    - order: 1
      id: '055-schema-repo'
      description: Add migrations and repository/models support for groups and memberships.
      agent: dev-2
      owned_files:
        - Games-Labs-Missions/migrations/
        - Games-Labs-Missions/internal/repositories/mission_repo.go
        - Games-Labs-Missions/internal/models/models.go
      parallel_safe: false
    - order: 2
      id: '055-progress-parent-state'
      description: Compute parent aggregates from existing child progress; align MissionProgress if required.
      agent: dev-2
      owned_files:
        - Games-Labs-Missions/internal/services/mission_service.go
        - Games-Labs-Missions/internal/repositories/mission_repo.go
      parallel_safe: false
    - order: 3
      id: '055-quest-overview-shape'
      description: Implement grouped Daily tab JSON in QuestOverviewService with tests.
      agent: dev-2
      owned_files:
        - Games-Labs-Missions/internal/services/quest_overview_service.go
        - Games-Labs-Missions/internal/services/quest_overview_service_test.go
      parallel_safe: false
    - order: 4
      id: '055-parent-claim'
      description: Parent claim handler/route + service persistence + wallet credit path.
      agent: dev-2
      owned_files:
        - Games-Labs-Missions/internal/services/mission_service.go
        - Games-Labs-Missions/internal/handlers/mission_handler.go
        - Games-Labs-Missions/internal/routes/apiv1.go
      parallel_safe: false
    - order: 5
      id: '055-admin-docs'
      description: Admin APIs for groups, README contract, Postman updates.
      agent: dev-2
      owned_files:
        - Games-Labs-Missions/internal/handlers/mission_handler.go
        - Games-Labs-Missions/README.md
        - api-gateway/docs/Games-Labs-APIs.postman_collection.json
      parallel_safe: false
  risks:
    - risk: Mobile breaks on overview JSON changes
      mitigation: Additive fields or dual flat+grouped arrays for one release; coordinate TASK-049 consumers.
    - risk: Unclear whether parent unlock requires children claimed vs merely complete
      mitigation: Document rule in README and mirror in tests (default all children IsComplete).
    - risk: Parent rewards interact unexpectedly with daily mission cap
      mitigation: Align RecordMission and cap checks with existing daily activity claims.
  estimated_complexity: high

assignment:
  primary: dev-2
  parallel: false
  reason: >-
    Schema, aggregation, overview contract, new claim path, and admin surface span multiple layers;
    sequential ownership avoids shared-file conflicts.

summary: |
  TASK-055 formalizes Daily parent/group missions in Games-Labs-Missions using new tables that reference
  existing daily_activities as children. Implementation progresses through migrations and repo reads,
  derived parent state, quest overview grouping, a dedicated parent claim path, and admin/documentation.
  Gateway protobufs probably stay on Struct-based overview; verify before release.

