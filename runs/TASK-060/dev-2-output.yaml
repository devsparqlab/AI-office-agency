summary: |
  Implemented game-scoped turnover producers for Daily Activities v1: optional RoundLifecycle.SettledAmount
  is persisted on first idempotent round_lifecycles insert (migration 019), and when > 0 the same insert
  gate emits turnover.settled with canonical game UUID/type from DB, deterministic event_id prefix
  player-activity:game-turnover:{round_id}:…, source_reference round id/type round, and Asia/Bangkok
  consumer rules unchanged via occurred_at semantics. turnover.reversed mirrors round.reversed when stored
  amount > 0, with reverse_of_event_id linking to the forward turnover event_id (Order exchange turnover
  unchanged; documented separation from diamond-package rail). README documents SoT (caller-supplied amount;
  AFB valid_turnover as intended ingress), duplicate/reversal behavior, and TASK-061 filters. No shared-lib
  struct changes — reused PlayerActivityEvent fields only.

