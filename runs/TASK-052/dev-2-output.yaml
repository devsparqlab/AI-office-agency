summary: |
  Implemented the core Game round settlement idempotency path for TASK-052. `UpsertRoundSettlement` now inserts with `ON CONFLICT DO NOTHING` and returns whether the settlement was newly inserted. `SettleRound` publishes `round.settled` only for a newly inserted lifecycle, so a duplicate settlement for the same `round_id` returns the existing lifecycle without double-publishing progress.

  Existing Game player activity publishing already emits the canonical `player.activity.v1` payload with `round_count=1`, `game_id`, `game_type`, `source_service=games-labs-game`, and `source_reference_type=round`. This task did not add a new shared-lib gamepb RPC or Provider callback contract; if Provider must call Game directly from callbacks, that should be handled as a separate contract task.
