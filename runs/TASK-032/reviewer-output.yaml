summary: |
  Final review for TASK-032 closure. Runtime settlement ownership hooks for Order
  turnover and Game rounds are approved based on the latest debugger and
  adjudication evidence.

  The repeated earlier review finding said Game `SettleRound` and `ReverseRound`
  were helper-only wrappers. The current debugger output documents that this is
  stale against HEAD: `SettleRound` writes canonical persisted state through
  `UpsertRoundSettlement`, while `ReverseRound` loads an already-settled lifecycle
  and persists distinct reversal state through `ReverseRoundSettlement`. The
  repository layer stores separate settlement and reversal timestamps, and focused
  tests cover canonical settle state, reversal anchored to persisted settlement,
  missing-settlement rejection, and idempotent reversal behavior.

  The Order turnover hook is also recorded as attached to the real fulfillment
  transition. The task is already `phase: done` by manual adjudication, and no
  fresh blocker remains.
