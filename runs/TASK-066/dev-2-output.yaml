summary: |
  Implemented the shared-lib Missions check-in calendar contract only. Added
  typed proto messages for calendar days, rewards, consecutive milestones,
  milestone claim, restore quote/result, and admin check-in config, then exposed
  the Mobile and Backoffice endpoints through grpc-gateway annotations.

  RestoreStreak was migrated from Struct to typed RestoreStreakRequest and
  RestoreStreakResponse so the existing POST /api/v1/missions/streak/restore
  path has a typed downstream contract. This is an intentional sequenced
  contract break: Games-Labs-Missions must not be changed in this task and must
  wait until github.com/SparqLab/shared-lib is published and bumped.

  Regenerated Missions protobuf, gRPC, grpc-gateway, swagger helper, and swagger
  JSON artifacts with buf generate; swagger.pb.go produced no diff. go test
  ./... passes in shared-lib. buf lint was retried with a writable cache and
  still fails on pre-existing repository-wide lint violations; the new check-in
  RPC type names were adjusted so they do not add the specific RPC naming
  failures from the first lint pass.
artifacts:
  - path: shared-lib/proto/missionspb/missions.proto
    action: modified
  - path: shared-lib/proto/missionspb/missions.pb.go
    action: modified
  - path: shared-lib/proto/missionspb/missions_grpc.pb.go
    action: modified
  - path: shared-lib/proto/missionspb/missions.pb.gw.go
    action: modified
  - path: shared-lib/proto/missionspb/missions.swagger.json
    action: modified
  - path: ai-dev-office/runs/TASK-066/dev-2-output.yaml
    action: created
next_action:
  agent: reviewer
  reason: "Ready for review of the shared-lib contract and generated artifacts before publishing/bumping shared-lib for downstream Missions work."
context_sources:
  github:
    branch: "main"
    pr: ""
  socraticode:
    status: fallback
    queries:
      - "codebase_status projectPath=d:\\llm"
      - "codebase_status projectPath=/Users/earth/Documents/GitHub"
      - "GetCheckInCalendar RestoreStreak CheckInConfig missions.proto"
    relevant_symbols:
      - "shared-lib/proto/missionspb/missions.proto"
      - "shared-lib/proto/missionspb/missions.pb.go"
      - "shared-lib/proto/missionspb/missions_grpc.pb.go"
      - "shared-lib/proto/missionspb/missions.pb.gw.go"
      - "shared-lib/proto/missionspb/missions.swagger.json"
    notes: "No SocratiCode MCP tool was exposed. npx fallback initially hit a root-owned npm cache error; retrying with a writable cache returned no usable status output, so source files on disk were used as final evidence."
blockers:
  - "buf lint is not clean for the existing shared-lib baseline; rerun used BUF_CACHE_DIR=/private/tmp/codex-buf-cache and reported repository-wide package/naming/Struct lint violations outside this task."
  - "Downstream Games-Labs-Missions implementation remains blocked until the user publishes and bumps github.com/SparqLab/shared-lib. Do not add local duplicate request/response types in Games-Labs-Missions."
