summary: |
  Implemented TASK-061 scoped turnover Daily Activities for Games-Labs-Missions.
  Added repository condition types `TURNOVER_GAME` and `TURNOVER_GAME_TYPE`
  (`mission_repo.go`). Extended `validateDailyActivityConfig` for strict mutual
  exclusion (`game_id` only vs `game_type` only) and amount threshold defaults
  (`mission_service.go`). Extended `mapPlayerActivityEventToDailyProgress` so
  `turnover.settled` credits deltas only when `settled_amount > 0`, event type
  matches, required scope metadata is present, and identifiers match (`game_id`
  equality, `game_type` case-insensitive consistent with rounds). Reverse
  events continue via existing `ApplyDailyActivityReverse` on stored applications.
  Added mapper unit tests, consumer sqlmock scenarios (including no-metadata
  ignored-forward path and scoped reversal), admin HTTP 400 dual-scope coverage,
  and README updates (`TASK-060` dependency, E2E flow note, docs tables and
  `condition_type` filter list).

artifacts:
  - path: Games-Labs-Missions/internal/repositories/mission_repo.go
    action: modified
    description: Add `TURNOVER_GAME` / `TURNOVER_GAME_TYPE` constants (repo layer).
  - path: Games-Labs-Missions/internal/services/mission_service.go
    action: modified
    description: Scoped turnover validation branches and mapper cases for turnover.settled.
  - path: Games-Labs-Missions/internal/services/mission_service_test.go
    action: modified
    description: Validation and `mapPlayerActivityEventToDailyProgress` table tests.
  - path: Games-Labs-Missions/internal/services/daily_activity_consumer_test.go
    action: modified
    description: Consumer tests for scoped match mismatch metadata, reversal.
  - path: Games-Labs-Missions/internal/handlers/mission_handler_test.go
    action: modified
    description: UpsertDailyActivity dual-scope rejection coverage.
  - path: Games-Labs-Missions/README.md
    action: modified
    description: TASK-060 / scoped turnover QA and admin spec updates.

