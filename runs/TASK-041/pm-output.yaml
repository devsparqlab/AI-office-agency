task:
  id: "TASK-041"
  title: "Add Event production mission APIs"
  short_name: "event-production-apis"
  parent: "TASK-038"
  epic: "Quest overview phase 2"
  type: feature
  priority: high
  created_at: "2026-05-06"
scope:
  target_services:
    - service: shared-lib
      reason: "Additive missionspb contracts for event list/detail."
    - service: Games-Labs-Missions
      reason: "Owner of event listing, detail, active window, progress, and reward state."
    - service: docs
      reason: "Postman collection must expose the new endpoints."
description: |
  Add GET /api/v1/missions/events and GET /api/v1/missions/events/{event_id}. Responses should expose claimable, claimed, and progress per user. Event claim is optional in this task only if the model is ready; otherwise it should be deferred to Phase 2.1.
acceptance_criteria:
  - criterion: "Event list/detail APIs return active/eligible events with per-user status."
  - criterion: "Responses include claimable, claimed, and progress."
  - criterion: "Inactive, expired, and timezone behavior is covered by tests."
  - criterion: "Admin create/update is not required; minimal read config is enough."
  - criterion: "Postman collection includes event list/detail requests."
plan:
  approach: |
    Implement Event read APIs first, model active windows clearly, and keep claim optional unless safe persistence already exists.
  subtasks:
    - order: 1
      description: "Inspect event/config patterns and update missionspb contract."
      agent: dev-2
    - order: 2
      description: "Implement event config/progress read boundary and service behavior."
      agent: dev-2
    - order: 3
      description: "Wire handler/routes/gRPC/main and add tests for inactive, expired, and timezone handling."
      agent: dev-2
  risks:
    - risk: "Event claim may require persistence that is not ready."
      mitigation: "Claim endpoint is optional and should be deferred if duplicate claim protection cannot be verified."
  estimated_complexity: high
assignment:
  primary: dev-2
  parallel: false
  reason: "Time-windowed domain logic with user-specific status."
summary: |
  Created TASK-041 for Quest phase 2 Event production APIs.
artifacts:
  - path: "runs/TASK-041/task.md"
    action: created
  - path: "runs/TASK-041/status.yaml"
    action: created
next_action:
