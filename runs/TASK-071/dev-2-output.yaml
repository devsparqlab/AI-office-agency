summary: |
  Validated and tightened the 1UP gameplay turnover path without changing the
  external callback contract. `BetResult` already gated Game settlement after
  wallet debit/win and balance lookup; I added the same test seam used by the
  TASK-070 IDG lane so tests can assert the `TrySettleRound` call directly.

  Added focused tests for request `bet` as the authoritative turnover source,
  Redis cached bet fallback, zero/no-source handling, wallet debit failure skip,
  win credit failure skip, and refund no forward `SettleRound`. Handler tests now
  also lock wallet-failure error mapping and refund endpoint delegation.

  README and verification evidence now include 1UP-specific log grep patterns,
  wallet SQL, Game `round_lifecycles` SQL, and Missions `turnover.settled`
  downstream checks. Refund remains intentionally forward-settlement-free; there
  is no reverse Game contract implemented for 1UP in this task.

  Verification:
  - `go test ./internal/core/services/oneup ./internal/handlers/providerhdl -count=1`
  - `go test ./...`
