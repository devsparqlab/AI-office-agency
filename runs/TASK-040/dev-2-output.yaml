summary: |
  Implemented production Weekly mission APIs across shared-lib and Games-Labs-Missions.
  The shared contract now exposes additive weekly list and claim RPCs with grpc-gateway mappings, and the generated missionspb artifacts were regenerated.
  In Missions, Weekly was added as its own domain slice with deterministic Bangkok Monday-to-Monday reset logic, static production mission definitions, progress derived from persisted mission_logs inside the active weekly window, and explicit persisted claim state in weekly_mission_claims.
  The claim flow uses a repository transaction plus PostgreSQL advisory locking and a deterministic wallet idempotency key so repeated user attempts return already_claimed without double-crediting rewards.
  I also wired the new HTTP routes, gRPC bridge methods, service construction, focused service/handler tests, and Postman requests.
  Compatibility note: because shared-lib and Games-Labs-Missions are sibling repos, local validation for Missions used a temporary go.work so the unpublished shared-lib proto changes were visible without adding a replace directive.
