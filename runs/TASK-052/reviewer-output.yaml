summary: |
  Approved against PM-scoped acceptance criteria. Games-Labs-Game now persists round_lifecycles
  idempotently via `UpsertRoundSettlement` (`ON CONFLICT (round_id) DO NOTHING` + inserted flag),
  and `SettleRound` publishes `player.activity.v1` `round.settled` only when a row is newly inserted.
  `publishRoundSettled` already emits canonical metadata (`round_count=1`, `game_id`, `game_type`,
  `source_service=games-labs-game`, `source_reference_type=round`). `LaunchGame` does not touch
  settlement or publishing. `TestSettleRoundPublishesOnlyWhenSettlementIsInserted` covers
  publish-once vs duplicate paths.

  task.md also asks for a real provider/game settlement path to call `SettleRound`; no handler,
  gRPC, or Provider callback invokes it yet (only service-layer + tests). PM plan explicitly
  deferred Provider→Game wiring to a future contract task; treat that as follow-up, not a blocker
  for this idempotency/publish-once slice.
