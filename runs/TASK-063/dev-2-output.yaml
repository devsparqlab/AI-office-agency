summary: |
  Implemented Golden Pass user-game playability APIs end to end.

  In shared-lib, `gamepb.Game` and `gamepb.CategoryGame` now expose optional
  `is_playable` and `playability_reason` fields, and a new `ListUserGame`
  endpoint is available at `/api/v1/game/my-games`. After the user published
  shared-lib, Games-Labs-Game was bumped to
  `github.com/SparqLab/shared-lib v0.0.0-20260521084502-88c071b64c68`.

  Delivered behavior:
  - `ListGame` is discoverability-first and returns all games; authenticated
    responses annotate games with playability metadata.
  - `ListUserGame` is the filtered authenticated list and returns only playable games.
  - `ListCategory` remains a public catalog and is also annotated for authenticated users.
  - user lookup failure leaves discoverability responses unannotated instead of failing.
  - `LaunchGame` behavior remains unchanged.

