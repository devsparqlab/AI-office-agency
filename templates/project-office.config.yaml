# Project office config starter.
# Copy this into a target project and adapt the values for that repo.

office:
  name: Project Office
  version: "1.0"

agents:
  - id: pm
    prompt: agents/pm.md
    description: Plans and assigns work
  - id: dev
    prompt: agents/dev.md
    description: Implements scoped work
  - id: dev-2
    prompt: agents/dev-2.md
    description: Handles complex implementation work
  - id: reviewer
    prompt: agents/reviewer.md
    description: Reviews output and checks builds and tests
  - id: debugger
    prompt: agents/debugger.md
    description: Investigates failures
  - id: devops
    prompt: agents/devops.md
    description: Handles deployment and infrastructure work
  - id: free-roam
    prompt: agents/free-roam.md
    description: Escalation and unblocking agent

default_workflow: workflows/hybrid-default.yaml

runner_selector:
  priority:
    - codex
    - cursor-agent
    - cursor
  config_dir: runners/
  auto_switch: true
  retry_before_switch: 2

dependency_guard:
  enabled: false
  script: scripts/check-service-dependencies.sh

context_provider:
  enabled: true
  provider: socraticode
  mode: optional
  project_paths:
    primary: "${SOCRATICODE_PRIMARY_PROJECT}"
    fallback: "${SOCRATICODE_FALLBACK_PROJECT}"

loop_guard:
  max_iterations: 8
  escalate_to: free-roam
