task:
  id: "TASK-067"
  title: "Check-In Calendar Missions Runtime"
  short_name: "check-in-calendar-runtime"
  parent: "TASK-066"
  epic: "Check-In Calendar and Consecutive Bonus"
  type: feature
  priority: high
  created_at: "2026-05-25"

scope:
  target_services:
    - service: Games-Labs-Missions
      reason: >
        Owns durable check-in calendar runtime state, campaign config, reward
        claiming, restore pricing, handlers, routes, gRPC dispatch, and tests.
    - service: shared-lib
      reason: >
        Dependency only. The published TASK-066 contract must be available before
        implementation starts.
    - service: Games-Labs-Wallet
      reason: >
        Existing credit/debit integration is reused for milestone reward credits
        and restore price debits; no wallet contract changes are planned.
  affected_files:
    - path: "Games-Labs-Missions/go.mod"
      action: modify
      description: "Bump github.com/SparqLab/shared-lib to the published TASK-066 version."
    - path: "Games-Labs-Missions/go.sum"
      action: modify
      description: "Keep module sums aligned with go.mod."
    - path: "Games-Labs-Missions/migrations/023_check_in_calendar.sql"
      action: create
      description: "Create campaign, milestone, restore config, day ledger, milestone claim, and restore ledger tables."
    - path: "Games-Labs-Missions/internal/models/models.go"
      action: modify
      description: "Add check-in calendar runtime/config models."
    - path: "Games-Labs-Missions/internal/repositories/mission_repo.go"
      action: modify
      description: "Add repository methods for campaign config, ledgers, claims, and restore records."
    - path: "Games-Labs-Missions/internal/repositories/mission_repo_test.go"
      action: modify
      description: "Add sqlmock coverage for new repository behavior."
    - path: "Games-Labs-Missions/internal/services/check_in_calendar_service.go"
      action: create
      description: "Focused service for calendar status, milestone eligibility, restore quote, and response composition."
    - path: "Games-Labs-Missions/internal/services/check_in_calendar_service_test.go"
      action: create
      description: "Focused service tests for calendar, milestone, and restore logic."
    - path: "Games-Labs-Missions/internal/services/mission_service.go"
      action: modify
      description: "Integrate durable check-in ledger, milestone claim, and restore behavior while preserving existing monthly/streak behavior."
    - path: "Games-Labs-Missions/internal/handlers/mission_handler.go"
      action: modify
      description: "Add Mobile check-in calendar, milestone claim, and restore quote handlers."
    - path: "Games-Labs-Missions/internal/handlers/adminhdl/admin_handler.go"
      action: modify
      description: "Add Backoffice check-in config handlers."
    - path: "Games-Labs-Missions/internal/routes/apiv1.go"
      action: modify
      description: "Register Mobile and Backoffice check-in routes."
    - path: "Games-Labs-Missions/internal/grpc/missiongrpc/server.go"
      action: modify
      description: "Dispatch new shared-lib RPCs to HTTP handlers."
    - path: "Games-Labs-Missions/internal/services/quest_overview_service.go"
      action: modify
      description: "Expose backward-compatible check-in summary or calendar endpoint reference."

description: |
  Implement the runtime side of the Monthly Check-In Calendar and Consecutive
  Bonus feature in Games-Labs-Missions after the TASK-066 shared-lib contract is
  published and bumped. This includes durable persistence, Mobile APIs,
  Backoffice config APIs, milestone reward crediting, restore quote/debit logic,
  quest overview integration, and focused tests.

acceptance_criteria:
  - criterion: "Games-Labs-Missions uses the published TASK-066 shared-lib version with no committed replace directive."
  - criterion: "Migration 023_check_in_calendar.sql creates durable tables and uniqueness constraints for campaigns, ledgers, milestone claims, and restore records."
  - criterion: "GET /api/v1/missions/check-in/calendar returns backend-derived day statuses, rewards, milestones, and restore quote data."
  - criterion: "POST /api/v1/missions/check-in records today's ledger once per Bangkok day and preserves existing monthly challenge behavior."
  - criterion: "POST /api/v1/missions/check-in/milestones/{day}/claim credits configured rewards at most once per user/campaign/milestone."
  - criterion: "GET /api/v1/missions/streak/restore/quote and POST /api/v1/missions/streak/restore use durable restore pricing and ledger records."
  - criterion: "Backoffice check-in config read/update endpoints persist campaign, daily reward, milestone, and restore settings."
  - criterion: "GET /api/v1/quest/overview remains backward compatible and exposes a compact check-in summary or calendar endpoint reference."
  - criterion: "Focused repository, service, handler, gRPC dispatch, and overview tests cover success and failure paths."
  - criterion: "go test ./... passes in Games-Labs-Missions."
  - criterion: "GOWORK=off go build -mod=readonly ./... passes in Games-Labs-Missions, or the exact environment limitation is documented."

plan:
  approach: |
    Wait for TASK-066 and the published shared-lib version, then implement the
    Missions runtime in dependency order: module bump, migrations/models/repo,
    service logic, handlers/routes/gRPC dispatch, quest overview summary, and
    verification. Keep the check-in calendar logic in a focused service file
    instead of growing mission_service.go further.
  subtasks:
    - order: 1
      id: "shared-lib-bump"
      description: "Bump Games-Labs-Missions to the published TASK-066 shared-lib version and run go mod tidy."
      agent: dev-2
      owned_files:
        - "Games-Labs-Missions/go.mod"
        - "Games-Labs-Missions/go.sum"
      parallel_safe: false
    - order: 2
      id: "check-in-persistence"
      description: "Add migrations, models, repository methods, and repository tests."
      agent: dev-2
      owned_files:
        - "Games-Labs-Missions/migrations/023_check_in_calendar.sql"
        - "Games-Labs-Missions/internal/models/models.go"
        - "Games-Labs-Missions/internal/repositories/mission_repo.go"
        - "Games-Labs-Missions/internal/repositories/mission_repo_test.go"
      parallel_safe: false
    - order: 3
      id: "check-in-service"
      description: "Implement calendar composition, check-in ledger updates, milestone claim logic, restore quote/debit logic, and service tests."
      agent: dev-2
      owned_files:
        - "Games-Labs-Missions/internal/services/mission_service.go"
        - "Games-Labs-Missions/internal/services/check_in_calendar_service.go"
        - "Games-Labs-Missions/internal/services/check_in_calendar_service_test.go"
        - "Games-Labs-Missions/internal/services/mission_service_test.go"
      parallel_safe: false
    - order: 4
      id: "check-in-handlers"
      description: "Add Mobile and Backoffice handlers, routes, gRPC dispatch, and handler/dispatch tests."
      agent: dev-2
      owned_files:
        - "Games-Labs-Missions/internal/handlers/mission_handler.go"
        - "Games-Labs-Missions/internal/handlers/adminhdl/admin_handler.go"
        - "Games-Labs-Missions/internal/routes/apiv1.go"
        - "Games-Labs-Missions/internal/grpc/missiongrpc/server.go"
      parallel_safe: false
    - order: 5
      id: "quest-overview-summary"
      description: "Add backward-compatible quest overview check-in summary or calendar endpoint reference."
      agent: dev-2
      owned_files:
        - "Games-Labs-Missions/internal/services/quest_overview_service.go"
        - "Games-Labs-Missions/internal/services/quest_overview_service_test.go"
      parallel_safe: false
    - order: 6
      id: "runtime-verification"
      description: "Run Missions tests/build verification and record implementation output."
      agent: dev-2
      owned_files:
        - "ai-dev-office/runs/TASK-067/dev-2-output.yaml"
      parallel_safe: false
  risks:
    - risk: "The published shared-lib version is unavailable."
      mitigation: "Keep the task blocked; do not commit replace directives."
    - risk: "Existing monthly/streak behavior regresses."
      mitigation: "Add compatibility tests around current check-in, monthly, and streak paths."
    - risk: "Reward credit/debit side effects duplicate."
      mitigation: "Use deterministic idempotency keys and durable unique constraints."
  estimated_complexity: high

assignment:
  primary: dev-2
  parallel: false
  reason: "Cross-cutting Missions runtime work across persistence, service logic, handlers, gRPC dispatch, dependencies, and tests."

summary: |
  TASK-067 is the downstream Games-Labs-Missions runtime task for the check-in
  calendar feature. It is intentionally blocked until TASK-066 is complete and
  shared-lib has been published and bumped.

artifacts:
  - path: runs/TASK-067/task.md
    action: created
  - path: runs/TASK-067/status.yaml
    action: created
  - path: runs/TASK-067/pm-output.yaml
    action: created

next_action:
  agent: dev-2
  reason: "Run after TASK-066 is done and shared-lib publish/bump is available."

context_sources:
  github:
    branch: ""
    pr: ""
  socraticode:
    status: used
    queries:
      - "codebase_status projectPath=/Users/earth/Documents/GitHub"
      - "MonthlyChallenge UserStreak RestoreStreak MissionConfig check-in calendar missions"
    relevant_symbols:
      - "Games-Labs-Missions/internal/models/models.go"
      - "Games-Labs-Missions/internal/services/mission_service.go"
      - "Games-Labs-Missions/internal/repositories/mission_repo.go"
      - "Games-Labs-Missions/internal/routes/apiv1.go"
      - "docs/superpowers/plans/2026-05-25-check-in-calendar-consecutive-bonus.md"
    notes: "Local Docker SocratiCode status was green; source files remain the source of truth."

blockers:
  - "TASK-066 must be done."
  - "User must publish and approve the shared-lib dependency bump before implementation starts."
