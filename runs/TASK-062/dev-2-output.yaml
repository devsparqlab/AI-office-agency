notes:
  - TASK-062 explicitly leaves authenticated ListCategory filtering as an open product decision; this implementation preserves the task scope by applying Golden Pass gating to authenticated List and LaunchGame only.
  - shared-lib publish/bump was completed before finalizing downstream consumer module versions, matching AGENTS.md guidance for cross-service proto changes.

