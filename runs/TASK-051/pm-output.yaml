task:
  id: "TASK-051"
  title: "Backoffice Daily Activity Smoke Test"
  short_name: "daily-activity-smoke"
  parent: "TASK-049"
  epic: "Mobile Missions integration"
  type: feature
  priority: high
  created_at: "2026-05-18"
scope:
  target_services:
    - service: "Games-Labs-Missions"
      reason: "Owns the Daily Activity admin CRUD, user-facing overview/progress reads, claim flow, and the tests that prove the backoffice contract."
    - service: "docs"
      reason: "Holds the operator-facing smoke-test steps and rollout checklist for backoffice verification."
  affected_files:
    - path: "Games-Labs-Missions/README.md"
      action: modify
      description: "Add a repeatable backoffice smoke-test runbook for create/update/deactivate/verify against the Mobile-facing APIs."
    - path: "Games-Labs-Missions/internal/handlers/admin_handler.go"
      action: modify
      description: "Adjust admin Daily Activity HTTP behavior if any backoffice contract gap is exposed by the smoke-test coverage."
    - path: "Games-Labs-Missions/internal/handlers/admin_handler_test.go"
      action: modify
      description: "Add HTTP coverage for Daily Activity create/list/detail/update/activate/deactivate behavior and immutable-field rejection."
    - path: "Games-Labs-Missions/internal/handlers/mission_handler.go"
      action: modify
      description: "Adjust user-facing Daily Activity exposure if the smoke test shows any mismatch in Mobile responses."
    - path: "Games-Labs-Missions/internal/handlers/mission_handler_test.go"
      action: modify
      description: "Verify inactive Daily Activity rows disappear from quest/overview and missions/progress responses."
    - path: "Games-Labs-Missions/internal/repositories/mission_repo.go"
      action: modify
      description: "Adjust repository queries if the smoke test exposes missing Daily Activity filtering or persistence behavior."
    - path: "Games-Labs-Missions/internal/repositories/mission_repo_test.go"
      action: modify
      description: "Add persistence and filtering tests for admin-created Daily Activities and user-facing active-row reads."
    - path: "Games-Labs-Missions/internal/services/mission_service.go"
      action: modify
      description: "Adjust Daily Activity validation or state transitions if immutable condition or deactivate semantics need tightening."
    - path: "Games-Labs-Missions/internal/services/mission_service_test.go"
      action: modify
      description: "Add service-level tests for immutable condition fields, editable fields, and deactivate/read-path behavior."
description: |
  Prove that Daily Activity v1 works as a production-style backoffice workflow without depending on SQL seed rows.

  The implementation should validate the existing Missions contract end-to-end from the operator side: create an activity, update only allowed fields, inspect list/detail responses, deactivate it, and confirm the activity disappears from Mobile-facing quest/overview and missions/progress responses. The task should also protect immutable condition/scope fields and document a concrete smoke-test sequence for ops/backoffice use.
acceptance_criteria:
  - criterion: "Admin create persists the full Daily Activity payload that ops needs, including display data, reward data, condition type, threshold, and any required scope fields."
  - criterion: "Admin update accepts editable fields and rejects attempts to change immutable condition/scope fields."
  - criterion: "Admin deactivate prevents the activity from appearing in `GET /api/v1/quest/overview` and `GET /api/v1/missions/progress`."
  - criterion: "User-facing overview/progress reads reflect activities created through the admin path rather than requiring SQL seed rows."
  - criterion: "README documents a step-by-step smoke test with exact endpoints, expected status codes, and the create -> verify -> deactivate -> re-verify flow."
  - criterion: "Focused tests cover the Daily Activity admin and user-facing contract in `Games-Labs-Missions`."
plan:
  approach: |
    Keep the work sequential inside `Games-Labs-Missions`. First prove the backoffice contract with focused repo/service/handler tests, then update the README with a repeatable smoke-test runbook. If the tests expose a real contract gap, fix it in the existing Daily Activity service/repository/handler paths and keep the admin and Mobile-facing behaviors aligned.
  subtasks:
    - order: 1
      id: "daily-activity-contract-verification"
      description: "Add or tighten tests across repository, service, and handler layers to prove create/update/detail/list/deactivate behavior, immutable condition protection, and user-facing filtering."
      agent: dev-2
      owned_files:
        - "Games-Labs-Missions/internal/repositories/mission_repo_test.go"
        - "Games-Labs-Missions/internal/services/mission_service_test.go"
        - "Games-Labs-Missions/internal/handlers/admin_handler_test.go"
        - "Games-Labs-Missions/internal/handlers/mission_handler_test.go"
      parallel_safe: false
    - order: 2
      id: "daily-activity-smoke-docs"
      description: "Add a concise backoffice smoke-test section to the Missions README with exact operator steps and expected outcomes."
      agent: dev-2
      owned_files:
        - "Games-Labs-Missions/README.md"
      parallel_safe: false
  risks:
    - risk: "Admin list/detail semantics already document richer fields than the code path may expose consistently."
      mitigation: "Use the tests to pin the real behavior first, then align implementation or docs to that contract."
    - risk: "Inactive admin rows must remain auditable for backoffice while disappearing from Mobile reads."
      mitigation: "Preserve admin visibility and only filter inactive rows in user-facing read paths."
  estimated_complexity: high
assignment:
  primary: dev-2
  parallel: false
  reason: "This is a single-service but multi-layer Daily Activity contract verification task spanning repository, service, handler, tests, and documentation."
summary: |
  This task proves the Daily Activity backoffice flow in Missions with focused contract tests and an operator smoke-test guide. The goal is to confirm that admin-created activities are persisted, mutable only where allowed, excluded from Mobile-facing APIs when inactive, and documented with a repeatable verification sequence.
artifacts:
