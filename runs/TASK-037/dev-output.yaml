summary: |
  Added a User-owned VIP tiers API across `shared-lib`, `Games-Labs-User`, and docs. The `userpb` contract now exposes additive `ListVipTiers` gRPC + grpc-gateway support for `GET /api/v1/vip/tiers`, and the regenerated `userpb` artifacts include the new route and schema.

  In `Games-Labs-User`, I added a deterministic VIP presentation model that merges existing `level_configs` with code-level presets for label/group/color/perks, then exposed it through both the direct HTTP handler (`GET /vip/tiers`) and the gRPC handler (`ListVipTiers`). Focused tests cover mapping, empty configs, fallback/partial-config presentation, the HTTP handler success path, and the gRPC handler success path. I also added the new request to the Postman collection.

  For local validation, `shared-lib` tests pass directly. `Games-Labs-User` still depends on the published `shared-lib` version in `go.mod`, so cross-repo validation was run with a temporary `go.work` linking the local `shared-lib` and `Games-Labs-User` modules instead of adding a forbidden `replace`.
