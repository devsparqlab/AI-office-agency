summary: |
  Completed the first runtime-hardening pass for the gameplay turnover rollout.
  This task did not change provider settlement business logic; instead it turned
  recent staging lessons into one canonical runbook, one operator helper
  script, and explicit workflow/doc guardrails across Provider, Game, and
  Missions.

  Added `ai-dev-office/docs/turnover-rollout-runbook.md` as the canonical
  source of truth for `GAME_API_URL`, shared `RABBITMQ_URL`, post-deploy log and
  SQL checks, the full IDG cancel reverse proof path, and shared-lib
  release/bump discipline. Added
  `ai-dev-office/scripts/verify-turnover-rollout.sh` as a lightweight helper
  that prints and, when local tools are present, runs the standard checks.

  Updated repo-local workflow comments/guards and service READMEs so the env
  ownership story is consistent:
  - Provider workflow/docs point to the canonical Game gRPC NodePort target
  - Game workflow now treats `RABBITMQ_URL` as a required deploy-time secret
  - Missions docs/workflow explicitly call out broker alignment with Game
  - Service READMEs link back to the canonical runbook

  Verification:
  - `bash -n ai-dev-office/scripts/verify-turnover-rollout.sh`
  - `./ai-dev-office/scripts/verify-turnover-rollout.sh --help`
  - `git -C Games-Labs-Provider diff --check`
  - `git -C Games-Labs-Game diff --check`
  - `git -C Games-Labs-Missions diff --check`
  - `git -C ai-dev-office diff --check -- docs/turnover-rollout-runbook.md scripts/verify-turnover-rollout.sh runs/TASK-077`
