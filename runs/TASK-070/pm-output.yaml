task:
  id: "TASK-070"
  title: "IDG Bet-Debit Gameplay Turnover Settlement"
  short_name: "idg-bet-debit-turnover"
  parent: "TASK-069"
  epic: "Quest Daily Turnover / Provider Gameplay Settlement"
  type: bugfix
  priority: high
  created_at: "2026-06-01"
scope:
  target_services:
    - service: Games-Labs-Provider
      reason: "IDG owns the bet/win/cancel callbacks and must produce Game SettleRound from the authoritative bet debit."
    - service: Games-Labs-Game
      reason: "Receives SettleRound and emits turnover.settled; no code change expected."
    - service: ai-dev-office
      reason: "Tracks provider-specific verification evidence."
  affected_files:
    - path: "Games-Labs-Provider/internal/core/services/idg/callback.go"
      action: modify
      description: "Move forward SettleRound to IDGBet after wallet debit success and avoid win-time double settle."
    - path: "Games-Labs-Provider/internal/core/services/idg/turnover.go"
      action: modify
      description: "Make bet amount the authoritative turnover source and retire fragile win cache dependency if no longer needed."
    - path: "Games-Labs-Provider/internal/core/services/idg/callback_test.go"
      action: modify
      description: "Cover bet success, wallet failure, win no-double-count, and cancel/reversal behavior."
    - path: "Games-Labs-Provider/internal/core/services/idg/turnover_test.go"
      action: modify
      description: "Cover amount parsing and zero/invalid turnover cases."
    - path: "Games-Labs-Provider/README.md"
      action: modify
      description: "Document IDG bet-debit turnover source and runtime checks."
    - path: "ai-dev-office/runs/TASK-070/verification-evidence.md"
      action: create
      description: "Record IDG SQL/log checklist and verification commands."
description: |
  Repair IDG Quest turnover by producing Game SettleRound from the successful IDGBet debit path instead of waiting for IDGWin and Redis stake cache. Missions must continue to consume only Game turnover.settled events; it must not query wallet_transactions directly.
acceptance_criteria:
  - criterion: "IDGBet calls Game SettleRound only after IDGDebitWallet succeeds."
  - criterion: "SettleRound uses wagerID, userID, gameID, provider_code=idg, and parsed Amount as settled_amount."
  - criterion: "IDGWin no longer sends a second forward SettleRound for the same wager."
  - criterion: "Wallet debit failures do not call SettleRound."
  - criterion: "IDGCancel reverse behavior is implemented or explicitly documented as a blocker before staging enablement."
  - criterion: "Tests cover bet success, wallet failure, win no-double-count, cancel/reversal behavior, and amount mapping."
  - criterion: "README and verification evidence include IDG SQL/log checklist."
  - criterion: "go test ./internal/core/services/idg ./internal/handlers/idghdl and go test ./... pass in Games-Labs-Provider."
plan:
  approach: |
    Use test-first changes in the IDG service. Shift the forward gameplay turnover source to the successful bet debit callback, ensure win callbacks cannot double-count, and resolve cancel/reversal semantics before staging enablement.
  subtasks:
    - order: 1
      id: "red-idg-bet-settle-tests"
      description: "Add failing tests for bet-time SettleRound success and wallet failure skip."
      agent: dev-2
      owned_files:
        - "Games-Labs-Provider/internal/core/services/idg/callback_test.go"
      parallel_safe: false
    - order: 2
      id: "implement-idg-bet-settle"
      description: "Call TrySettleRound from IDGBet after debit wallet success using req.Amount."
      agent: dev-2
      owned_files:
        - "Games-Labs-Provider/internal/core/services/idg/callback.go"
        - "Games-Labs-Provider/internal/core/services/idg/turnover.go"
      parallel_safe: false
    - order: 3
      id: "idg-cancel-reversal-decision"
      description: "Implement cancel reverse path or document a hard staging blocker if Game reverse contract is missing."
      agent: dev-2
      owned_files:
        - "Games-Labs-Provider/internal/core/services/idg/callback.go"
        - "ai-dev-office/runs/TASK-070/verification-evidence.md"
      parallel_safe: false
    - order: 4
      id: "idg-docs-verify"
      description: "Update README and record exact tests, logs, and SQL checks."
      agent: dev-2
      owned_files:
        - "Games-Labs-Provider/README.md"
        - "ai-dev-office/runs/TASK-070/verification-evidence.md"
      parallel_safe: false
  risks:
    - risk: "Counting at bet time can over-count canceled wagers."
      mitigation: "Do not enable without cancel reverse semantics or an explicit blocker."
    - risk: "Provider retries can duplicate callbacks."
      mitigation: "Use Game round_lifecycles insert gate and avoid win-time second settle."
  estimated_complexity: medium
assignment:
  primary: dev-2
  parallel: false
  reason: "Single-provider behavioral change with cancel semantics should be sequential and test-first."
summary: |
  TASK-070 opens the first provider-specific turnover repair lane. It moves IDG forward turnover to the bet debit callback and treats cancel/reversal as a required decision before staging.
artifacts:
  - path: runs/TASK-070/task.md
    action: created
  - path: runs/TASK-070/status.yaml
    action: created
  - path: runs/TASK-070/pm-output.yaml
    action: created
next_action:
  agent: dev-2
  reason: "Task is ready for IDG implementation."
context_sources:
  github:
    branch: ""
    pr: ""
  socraticode:
    status: used
    queries:
      - "IDG wallet_transactions idempotency_key idg:bet debit SettleRound"
      - "IDGBet IDGWin turnover SettleRound cache"
    relevant_symbols:
      - "Games-Labs-Provider/internal/core/services/idg/callback.go"
      - "Games-Labs-Provider/internal/core/services/idg/turnover.go"
      - "Games-Labs-Wallet/internal/models/transaction.go"
    notes: "Repository source confirms IDGBet has amount/wagerID and wallet debit idempotency; Missions must not query Wallet DB directly."
blockers: []
