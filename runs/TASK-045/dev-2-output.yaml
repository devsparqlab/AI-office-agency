summary: |
  Tightened Event UX consistency by carrying a shared `reset_in_seconds` timer through the Event list response and reusing it in Quest overview, so list/detail/overview now expose the same active-window countdown after TASK-043/TASK-044 without widening the surface to new per-item overview fields.
  Added focused consistency coverage for pre-claim and post-claim Event state across list, detail, and overview, plus handler/docs updates for the additive list timer field. Kept the existing contract boundary that list/overview only surface active events while detail still handles direct upcoming/expired/inactive lookups.
