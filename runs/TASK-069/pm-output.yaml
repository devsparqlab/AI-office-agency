task:
  id: TASK-069
  title: Multi-Provider Gameplay Turnover Settlement (Post-AFB)
  short_name: provider-turnover-settle
  parent: TASK-060
  epic: Mobile Missions integration
  type: feature
  priority: high
  created_at: "2026-05-29"

scope:
  target_services:
    - service: Games-Labs-Provider
      reason: Only service missing SettleRound wiring for non-AFB providers; owns seamless wallet callbacks and turnover mapping.
    - service: Games-Labs-Game
      reason: Inspect-only — generic SettleRound + turnover publishing already implemented; change only if contract gap found.
  affected_files:
    - path: Games-Labs-Provider/internal/adapters/gameadt/settle_round.go
      action: modify
      description: Add shared fire-and-forget TrySettleRound helper; keep SettleRoundInput contract.
    - path: Games-Labs-Provider/internal/core/services/providers/afb.go
      action: modify
      description: Refactor to shared helper (no behavior change).
    - path: Games-Labs-Provider/cmd/main.go
      action: modify
      description: Inject gameClient into non-AFB handlers/services.
    - path: Games-Labs-Provider/internal/handlers/providerhdl/oneup_callback.go
      action: modify
      description: Call SettleRound after OneUpBetResult wallet success.
    - path: Games-Labs-Provider/internal/handlers/vphdl/vp_seamless.go
      action: modify
      description: Call SettleRound after betnsettle wallet success.
    - path: Games-Labs-Provider/internal/handlers/idghdl/idg_callback.go
      action: modify
      description: Persist wager stake at bet; call SettleRound on win.
    - path: Games-Labs-Provider/internal/core/services/providers/ggsoft.go
      action: modify
      description: Call SettleRound on type 4 end_round after wallet success.
    - path: Games-Labs-Provider/internal/core/services/providers/sigma.go
      action: modify
      description: Wire end-round SettleRound hook (may defer E2E if wallet stub remains).
    - path: Games-Labs-Provider/README.md
      action: modify
      description: Document per-provider settlement hook and turnover source matrix.

description: |
  Extend the AFB-validated gameplay turnover settlement path to remaining seamless providers
  (1UP, VP, IDG, GGSoft, Sigma). Each provider gets an authoritative post-wallet settlement hook,
  a turnover/stake mapper that does not assume AFB-style valid_turnover, and fire-and-forget
  Game SettleRound invocation that logs failures without rolling back wallet funds.

  Reference: AFB Payout → settleGameplayRound → gameadt.SettleRound with afbPayoutTurnover mapping.
  Game service contract stays generic (provider_code + provider game id → canonical UUID).

acceptance_criteria:
  - criterion: AFB refactored to shared helper with unchanged behavior and passing afb_turnover_test.go
  - criterion: 1UP, VP, IDG, GGSoft call SettleRound after wallet-success at PM-defined hook points
  - criterion: Per-provider table-driven turnover mapper tests cover primary, fallback, and omit paths
  - criterion: Wallet failures and refund/cancel paths never call SettleRound
  - criterion: SettleRound errors log only; wallet HTTP responses remain success when wallet op succeeded
  - criterion: Sigma wired or explicitly deferred with hook ready and documented in verification evidence
  - criterion: GOWORK=off go build -mod=readonly ./... and go test ./... pass in Games-Labs-Provider

plan:
  approach: |
    Phase 1 — extract shared TrySettleRound from AFB pattern and inject gameClient into all provider
    handlers/services via main.go. Phase 2 — parallel per-provider wiring using PM provider matrix for
    hook points and turnover fallbacks. Phase 3 — README + verification evidence. Avoid shared-lib/Game
    contract changes unless dev-2 finds a blocking gap.
  subtasks:
    - order: 1
      id: settlement-scaffold-di
      description: Shared TrySettleRound helper; refactor AFB; DI gameClient to all provider entrypoints
      agent: dev-2
      owned_files:
        - Games-Labs-Provider/internal/adapters/gameadt/settle_round.go
        - Games-Labs-Provider/internal/core/services/providers/afb.go
        - Games-Labs-Provider/cmd/main.go
      parallel_safe: false
    - order: 2
      id: wire-1up-settle-round
      description: OneUpBetResult hook; bet/redis turnover mapper; tests
      agent: dev-2
      owned_files:
        - Games-Labs-Provider/internal/handlers/providerhdl/oneup_callback.go
        - Games-Labs-Provider/internal/handlers/providerhdl/oneup_runtime.go
      parallel_safe: true
    - order: 3
      id: wire-vp-settle-round
      description: betnsettle hook; validBetAmt/actualBetAmt mapper; tests
      agent: dev-2
      owned_files:
        - Games-Labs-Provider/internal/handlers/vphdl/vp_seamless.go
      parallel_safe: true
    - order: 4
      id: wire-idg-settle-round
      description: Wager stake cache at IDGBet; IDGWin hook; tests
      agent: dev-2
      owned_files:
        - Games-Labs-Provider/internal/handlers/idghdl/idg_callback.go
      parallel_safe: true
    - order: 5
      id: wire-ggsoft-settle-round
      description: Type 4 end_round hook; bet field mapper; tests
      agent: dev-2
      owned_files:
        - Games-Labs-Provider/internal/core/services/providers/ggsoft.go
      parallel_safe: true
    - order: 6
      id: wire-sigma-settle-round
      description: End-round hook; debit mapper; defer E2E if wallet stub
      agent: dev-2
      owned_files:
        - Games-Labs-Provider/internal/core/services/providers/sigma.go
        - Games-Labs-Provider/internal/handlers/sigmahdl/sigma.go
      parallel_safe: true
    - order: 7
      id: provider-settlement-docs-verify
      description: README matrix; build/test evidence
      agent: dev-2
      owned_files:
        - Games-Labs-Provider/README.md
        - ai-dev-office/runs/TASK-069/verification-evidence.md
      parallel_safe: false
  risks:
    - risk: Providers use different round-end semantics (split bet/win vs combined settle)
      mitigation: Per-provider mappers and hooks; do not reuse AFB valid_turnover assumptions
    - risk: Sigma wallet service is stubbed (balance always 0)
      mitigation: Wire hook + unit tests with mock gameClient; document staging E2E deferral
    - risk: Minor/major unit mismatch across providers
      mitigation: Explicit conversion in mappers with table tests
  estimated_complexity: high

assignment:
  primary: dev-2
  parallel: true
  reason: Cross-provider seamless callback work with provider-specific turnover semantics; mirrors TASK-060/TASK-052 dev-2 assignment pattern.

summary: |
  TASK-069 extends the validated AFB SettleRound path to 1UP, VP, IDG, GGSoft, and Sigma.
  PM mapped each provider's authoritative post-wallet hook, round/game identifiers, and proposed
  turnover fallback (without assuming valid_turnover). Implementation starts with a shared
  fire-and-forget helper and DI, then parallel per-provider wiring with table tests.

