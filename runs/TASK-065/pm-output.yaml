task:
  id: "TASK-065"
  title: "Game Playability Test Coverage And API Docs Sync"
  short_name: "game-playability-tests-and-docs"
  parent: "TASK-063"
  epic: "Store & Pass economy"
  type: refactor
  priority: medium
  created_at: "2026-05-22"

scope:
  target_services:
    - service: Games-Labs-Game
      reason: >
        Add focused test coverage for the shipped ListGame/ListUserGame/ListCategory
        split and its playability semantics.
    - service: api-gateway
      reason: >
        Update the gateway Postman collection copy so consumers can discover
        GET /api/v1/game/my-games.
    - service: docs
      reason: >
        Keep the duplicate top-level Postman collection aligned with the gateway copy.
  affected_files:
    - path: "Games-Labs-Game/internal/core/services/gamesvc/service.go"
      action: review
      description: "Source behavior for ListGame, ListUserGame, and ListCategory."
    - path: "Games-Labs-Game/internal/core/services/gamesvc/level_access.go"
      action: review
      description: "Shared helpers for metadata annotation and filtering."
    - path: "Games-Labs-Game/internal/core/handlers/gamehdl/grpc.go"
      action: review
      description: "Handler wiring for metadata forwarding and response mapping."
    - path: "Games-Labs-Game/internal/core/services/gamesvc/*test.go"
      action: create
      description: "Focused service-level tests for ListGame/ListUserGame/ListCategory behavior."
    - path: "Games-Labs-Game/internal/core/handlers/gamehdl/*test.go"
      action: create
      description: "Focused handler tests where practical for list endpoint mapping and metadata forwarding."
    - path: "api-gateway/docs/Games-Labs-APIs.postman_collection.json"
      action: modify
      description: "Add GET /api/v1/game/my-games and keep the gateway copy current."
    - path: "docs/Games-Labs-APIs.postman_collection.json"
      action: modify
      description: "Mirror the same my-games endpoint in the top-level duplicate collection copy."

description: |
  Close the two remaining gaps after TASK-063 artifact reconciliation:

  (1) focused tests for the shipped ListGame/ListUserGame/ListCategory split are
  missing from the current Games-Labs-Game tree, and
  (2) generated swagger already exposes /api/v1/game/my-games but the Postman/API
  collections have not been updated yet.

  This task should add coverage for the current behavior without changing Golden Pass
  semantics again, and should sync both Postman collection copies so the new endpoint
  is visible to downstream consumers.

acceptance_criteria:
  - criterion: "Focused tests cover ListGame guest metadata, authenticated metadata, and user lookup failure behavior."
  - criterion: "Focused tests cover ListUserGame authenticated filtering and guest-empty behavior."
  - criterion: "Focused tests cover ListCategory guest metadata and authenticated metadata behavior."
  - criterion: "Handler-level tests cover metadata forwarding and response mapping for updated list endpoints where practical."
  - criterion: "api-gateway/docs/Games-Labs-APIs.postman_collection.json includes GET /api/v1/game/my-games."
  - criterion: "docs/Games-Labs-APIs.postman_collection.json includes the same endpoint and remains aligned with the gateway copy."
  - criterion: "Verification records what was tested and confirms no Golden Pass semantics changed."

plan:
  approach: |
    (1) Write focused tests against the current shipped endpoint split:
        - ListGame annotates
        - ListUserGame filters
        - ListCategory annotates

    (2) Update both Postman collection copies with GET /api/v1/game/my-games and
        re-parse both collections to confirm valid JSON.

    (3) Verify Games-Labs-Game tests and summarize the no-semantics-change outcome.
  subtasks:
    - order: 1
      id: "game-list-playability-tests"
      description: >
        Add focused service and handler tests for ListGame, ListUserGame, and
        ListCategory using the current shipped semantics.
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/internal/core/services/gamesvc"
        - "Games-Labs-Game/internal/core/handlers/gamehdl"
      parallel_safe: false
    - order: 2
      id: "my-games-postman-sync"
      description: >
        Add GET /api/v1/game/my-games to both Postman collection copies and keep them aligned.
      agent: dev-2
      owned_files:
        - "api-gateway/docs/Games-Labs-APIs.postman_collection.json"
        - "docs/Games-Labs-APIs.postman_collection.json"
      parallel_safe: false
    - order: 3
      id: "review-playability-tests-and-docs"
      description: >
        Reviewer verifies tests match current semantics, collections are aligned,
        and no Golden Pass behavior changed in this follow-up.
      agent: reviewer
      owned_files: []
      parallel_safe: false
  risks:
    - risk: "Tests accidentally encode the pre-reconciliation TASK-063 narrative instead of the shipped API split."
      mitigation: "Anchor assertions to current service.go behavior before writing tests."
    - risk: "Only one Postman copy gets updated."
      mitigation: "Treat both collection files as in-scope and re-parse both after edits."
    - risk: "Docs imply ListUserGame is public."
      mitigation: "Describe it explicitly as the authenticated filtered line in request naming/examples."
  estimated_complexity: medium

assignment:
  primary: dev-2
  parallel: false
  reason: >
    This is a focused follow-up on the shipped Games-Labs-Game API split and requires
    both Go test work and Postman collection maintenance.

summary: |
  TASK-065 closes the remaining quality/documentation gaps after TASK-063:
  add focused test coverage for ListGame/ListUserGame/ListCategory semantics and
  sync both Postman collection copies with GET /api/v1/game/my-games. The follow-up
  must preserve current Golden Pass behavior exactly as shipped.

artifacts:
  - path: runs/TASK-065/task.md
    action: created
    description: "Task definition for game playability tests and docs sync."
  - path: runs/TASK-065/status.yaml
    action: created
    description: "Initial workflow state for the follow-up task."
  - path: runs/TASK-065/pm-output.yaml
    action: created
    description: "Structured PM handoff for implementation and review."

next_action:
  agent: dev-2
  reason: "Add focused tests for the three list endpoints and sync both Postman collection copies with /api/v1/game/my-games."

