summary: |
  Root cause was a stale README evidence table row left behind from the pre-TASK-070 IDG win-time settlement flow. The implementation and grep command had already moved to the `idg:bet` bet-debit path, but the checklist still told operators to look for `[idg:win]` SettleRound outcomes.

  Updated `Games-Labs-Provider/README.md` so the IDG verification table now documents `[idg:bet] game SettleRound ... err=` and `[idg:bet] skip SettleRound: GAME_API_URL not configured`, matching the current `IntegratorBet` call to `TrySettleRound` and the shared `TrySettleRound` log format. Verified the stale `idg:win` README text is gone and the README diff has no whitespace errors.
diagnosis:
  root_cause: "Provider README verification checklist retained stale `[idg:win]` log examples after TASK-070 moved IDG SettleRound production to `IDGBet`."
  affected_files:
