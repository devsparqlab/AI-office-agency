task:
  id: "TASK-068"
  title: "Check-In Calendar Docs And Consumer Handoff"
  short_name: "check-in-calendar-docs-handoff"
  parent: "TASK-066"
  epic: "Check-In Calendar and Consecutive Bonus"
  type: feature
  priority: medium
  created_at: "2026-05-25"

scope:
  target_services:
    - service: Games-Labs-Missions
      reason: "README/API behavior docs must describe the implemented check-in flows."
    - service: api-gateway
      reason: "Gateway Postman collection should expose the new Mobile and Backoffice endpoints."
    - service: docs
      reason: "Duplicate top-level collection copy should stay aligned when present."
    - service: ai-dev-office
      reason: "Durable verification evidence and handoff artifacts are tracked with the task."
  affected_files:
    - path: "Games-Labs-Missions/README.md"
      action: modify
      description: "Document Mobile and Backoffice check-in flows with request/response examples."
    - path: "api-gateway/docs/Games-Labs-APIs.postman_collection.json"
      action: modify
      description: "Add new check-in calendar, milestone, restore, and Backoffice config endpoints."
    - path: "docs/Games-Labs-APIs.postman_collection.json"
      action: modify
      description: "Mirror the same endpoint examples when this duplicate collection exists."
    - path: "ai-dev-office/runs/TASK-068/verification-evidence.md"
      action: create
      description: "Record docs sync commands and consumer handoff evidence."

description: |
  Synchronize docs, Postman collections, and Mobile/Backoffice handoff material
  after TASK-067 implements the runtime check-in calendar behavior. This task
  must use the final runtime code/swagger as source of truth rather than the
  earlier planning payloads.

acceptance_criteria:
  - criterion: "Games-Labs-Missions README documents calendar read, check-in, milestone claim, restore quote, restore action, and Backoffice config flows."
  - criterion: "Examples include per-day status/reward, milestone status/reward, restore price, and request bodies."
  - criterion: "api-gateway Postman collection includes the new Mobile and Backoffice check-in endpoints."
  - criterion: "Duplicate top-level Postman collection is updated with the same examples when present."
  - criterion: "Both Postman collection copies parse as valid JSON."
  - criterion: "Consumer handoff tells Mobile to render from backend status/reward fields and not infer state client-side."
  - criterion: "Verification evidence records exact commands and confirms docs match TASK-067 runtime endpoints."

plan:
  approach: |
    Wait for TASK-067 reviewer approval, then derive documentation and examples
    from the implemented runtime code and generated swagger. Update README and
    both Postman collection copies together, parse JSON, and leave a concise
    Mobile/Backoffice handoff artifact.
  subtasks:
    - order: 1
      id: "read-runtime-contract"
      description: "Inspect TASK-067 runtime code/swagger and list final endpoint examples."
      agent: dev-2
      owned_files:
        - "ai-dev-office/runs/TASK-068/verification-evidence.md"
      parallel_safe: false
    - order: 2
      id: "missions-readme-docs"
      description: "Update Missions README with Mobile and Backoffice flows."
      agent: dev-2
      owned_files:
        - "Games-Labs-Missions/README.md"
      parallel_safe: false
    - order: 3
      id: "postman-sync"
      description: "Update gateway and duplicate Postman collections with aligned endpoint examples."
      agent: dev-2
      owned_files:
        - "api-gateway/docs/Games-Labs-APIs.postman_collection.json"
        - "docs/Games-Labs-APIs.postman_collection.json"
      parallel_safe: false
    - order: 4
      id: "docs-verification"
      description: "Parse JSON collections and record handoff evidence."
      agent: dev-2
      owned_files:
        - "ai-dev-office/runs/TASK-068/verification-evidence.md"
        - "ai-dev-office/runs/TASK-068/dev-2-output.yaml"
      parallel_safe: false
  risks:
    - risk: "Docs are written from the plan instead of the final runtime behavior."
      mitigation: "Start by reading TASK-067 code/swagger and record evidence."
    - risk: "Duplicate collection files drift."
      mitigation: "Update and parse both collection copies in the same task."
  estimated_complexity: medium

assignment:
  primary: dev-2
  parallel: false
  reason: "Docs and duplicate collection sync should be done sequentially from final runtime behavior."

summary: |
  TASK-068 is the docs/Postman/Mobile handoff task for the check-in calendar
  feature. It is opened now for tracking but blocked until TASK-067 runtime work
  is reviewed.

artifacts:
  - path: runs/TASK-068/task.md
    action: created
  - path: runs/TASK-068/status.yaml
    action: created
  - path: runs/TASK-068/pm-output.yaml
    action: created

next_action:
  agent: dev-2
  reason: "Run after TASK-067 runtime implementation passes review."

context_sources:
  github:
    branch: ""
    pr: ""
  socraticode:
    status: used
    queries:
      - "codebase_status projectPath=/Users/earth/Documents/GitHub"
      - "Games-Labs-Missions README Postman check-in calendar"
    relevant_symbols:
      - "Games-Labs-Missions/README.md"
      - "api-gateway/docs/Games-Labs-APIs.postman_collection.json"
      - "docs/superpowers/plans/2026-05-25-check-in-calendar-consecutive-bonus.md"
    notes: "Local Docker SocratiCode status was green; docs must still be verified against source files and final runtime behavior."

blockers:
  - "TASK-067 runtime implementation must pass review first."
