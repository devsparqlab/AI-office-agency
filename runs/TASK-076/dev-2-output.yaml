summary: |
  Completed the missing cancel/reverse leg for the IDG gameplay turnover rail.
  `shared-lib` now exposes `GameService.ReverseRound`, `Games-Labs-Game`
  serves that RPC through the existing reverse lifecycle path, and
  `Games-Labs-Provider` calls the reverse hook from `IntegratorCancel` only
  after wallet refund succeeds.

  Added fresh test coverage at the contract, Game handler/service, and Provider
  service levels. The new tests assert the `ReverseRound` gRPC surface,
  one-time reverse event publishing in Game, refund-success reverse calls from
  IDG cancel, parsed `executionTime` -> `occurred_at`, and refund-failure skip.

  Updated the Provider README and TASK-076 verification evidence with the new
  `ReverseRound` log/SQL checklist. Both downstream services were also bumped to
  `github.com/SparqLab/shared-lib v0.0.0-20260601093703-0f6fb3d67904`.

  Verification:
  - `cd shared-lib && go test ./proto/gamepb`
  - `cd Games-Labs-Game && env GOPRIVATE='github.com/SparqLab/*' GONOSUMDB='github.com/SparqLab/*' GOPROXY=direct go test ./...`
  - `cd Games-Labs-Game && env GOPRIVATE='github.com/SparqLab/*' GONOSUMDB='github.com/SparqLab/*' GOPROXY=direct GOWORK=off go build -mod=readonly ./...`
  - `cd Games-Labs-Provider && env GOPRIVATE='github.com/SparqLab/*' GONOSUMDB='github.com/SparqLab/*' GOPROXY=direct go test ./...`
  - `cd Games-Labs-Provider && env GOPRIVATE='github.com/SparqLab/*' GONOSUMDB='github.com/SparqLab/*' GOPROXY=direct GOWORK=off go build -mod=readonly ./...`
  - `git diff --check` in `shared-lib`, `Games-Labs-Game`, and `Games-Labs-Provider`
