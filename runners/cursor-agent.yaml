runner:
  id: cursor-agent
  name: Cursor CLI Agent
  type: cli

invocation:
  command: cursor
  args:
    - "agent"
  prompt_flag: "-p"
  workdir_flag: null

capabilities:
  file_read: true
  file_write: true
  shell_exec: true
  git_ops: true
  multi_turn: true
  code_navigation: true

limits:
  timeout_seconds: 300
  max_output_tokens: 16384

health_check:
  command: "cursor agent --help"
  expect_exit_code: 0

notes: |
  Cursor CLI Agent is the first fallback after Codex.
  It runs from the terminal while preserving the same task and handoff contract.
