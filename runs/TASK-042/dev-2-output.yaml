summary: |
  Integrated Quest overview v2 in `Games-Labs-Missions` as a composition-only change. Daily and Monthly remain sourced from the existing mission progress/config flow, while Weekly, Event, and Invite now reuse their dedicated services and are emitted in the required fixed tab order: daily, weekly, monthly, event, invite.

  To keep the rollout backward compatible and rollback-safe, I did not change `shared-lib` or the gRPC contract: `GetQuestOverview` already returns `google.protobuf.Struct`, so the overview can add JSON fields without regenerating protobuf artifacts. The overview now degrades optional sections independently: if Weekly, Event, or Invite is unavailable, that tab stays in-place as the same inactive empty placeholder instead of failing the whole overview.

  I also documented the additive v2 response in Postman with a concrete example, and updated focused overview tests plus handler coverage to assert ordered populated tabs and partial fallback behavior.
