task:
  id: "TASK-052"
  title: "Wire Game Round Settlement Events"
  short_name: "game-round-settlement-events"
  parent: "TASK-049"
  epic: "Mobile Missions integration"
  type: feature
  priority: high
  created_at: "2026-05-18"
scope:
  target_services:
    - service: Games-Labs-Game
      reason: "Owns round_lifecycles persistence and canonical round.settled player.activity.v1 publishing."
    - service: docs
      reason: "Needs QA guidance for game-based Daily Mission settlement behavior."
description: |
  Ensure settled game rounds are recorded idempotently and publish canonical player.activity.v1 round events exactly once per round.
acceptance_criteria:
  - criterion: "SettleRound persists round_lifecycles idempotently."
  - criterion: "A newly inserted settlement publishes player.activity.v1 round.settled with round_count=1, game_id, game_type, and source metadata."
  - criterion: "Duplicate settlement for the same round_id does not publish progress twice."
  - criterion: "LaunchGame remains non-progress."
plan:
  approach: |
    Keep the change inside Games-Labs-Game core settlement behavior. Do not add a shared-lib proto contract in this task; use the existing player.activity.v1 event contract.
  subtasks:
    - order: 1
      id: "idempotent-round-settlement"
      description: "Make round_lifecycles insertion idempotent and expose whether a row was newly inserted."
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/internal/core/ports/repositories.go"
        - "Games-Labs-Game/internal/core/repositories/game.go"
      parallel_safe: false
    - order: 2
      id: "publish-on-first-settlement"
      description: "Publish round.settled only when a settlement row is newly inserted."
      agent: dev-2
      owned_files:
        - "Games-Labs-Game/internal/core/services/gamesvc/service.go"
        - "Games-Labs-Game/internal/core/services/gamesvc/round_lifecycle_test.go"
      parallel_safe: false
  risks:
    - risk: "Provider callback to Game service may require a future shared-lib gamepb contract addition."
      mitigation: "Do not introduce a hidden cross-service contract here; keep this task scoped to existing Game settlement core behavior."
  estimated_complexity: medium
assignment:
  primary: dev-2
  parallel: false
  reason: "Single-service persistence/event idempotency change."
summary: |
  TASK-052 is ready for manual dev-2 implementation against Games-Labs-Game core round settlement behavior.
