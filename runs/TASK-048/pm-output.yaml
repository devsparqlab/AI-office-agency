task:
  id: "TASK-048"
  title: "Add Daily mission item status contract"
  short_name: "daily-mission-status-contract"
  parent: "TASK-031"
  epic: "Mission UX contract alignment for Mobile"
  type: feature
  priority: medium
  created_at: "2026-05-14"
scope:
  target_services:
    - service: Games-Labs-Missions
      reason: "Owns Daily Activity progress, claims, and Quest overview responses."
    - service: docs
      reason: "Mobile button-state mapping needs API documentation."
description: |
  Add an additive per-item Daily mission status contract for Mobile so Daily missions can map not_started/in_progress to Go, claimable to Collect, and claimed to Done.
acceptance_criteria:
  - criterion: "GET /api/v1/missions/progress returns Daily Activity item status."
  - criterion: "GET /api/v1/quest/overview Daily tab passes through Daily Activity status."
  - criterion: "Statuses cover not_started, in_progress, claimable, and claimed."
  - criterion: "Existing response fields remain backward compatible."
  - criterion: "Focused tests and docs are added."
plan:
  approach: |
    Join active Daily Activities with current reset-window progress and mission_logs claims, then derive status in the Missions service and pass it through Quest overview.
  subtasks:
    - order: 1
      description: "Add Daily Activity response fields and repository current-window progress read model."
      agent: dev-2
    - order: 2
      description: "Derive status in GetProgress and pass status/progress through Quest overview."
      agent: dev-2
    - order: 3
      description: "Add tests for all four statuses and update docs."
      agent: dev-2
  risks:
    - risk: "Mobile may assume claim gating is enforced by status."
      mitigation: "Document claim gating as explicit non-scope and track separately if needed."
  estimated_complexity: medium
assignment:
  primary: dev-2
  parallel: false
  reason: "Focused Missions backend response contract change."
summary: |
  TASK-048 tracks the additive Daily mission item status contract requested by Mobile after UX clarification.
artifacts:
  - path: "runs/TASK-048/task.md"
    action: created
  - path: "runs/TASK-048/status.yaml"
    action: created
next_action:
  agent: dev-2
  reason: "Task was assigned to dev-2 scope; implementation and verification were completed in the Codex session."
blockers: []
