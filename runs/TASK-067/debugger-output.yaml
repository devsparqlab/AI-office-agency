summary: |
  Fixed the default check-in config persistence blocker. When a repository is configured and no active campaign row exists for the current month, GetCheckInConfig now persists the normalized default campaign, milestones, and restore config through UpsertCheckInConfig, then returns the persisted config with a real campaign ID. Daily ledger writes therefore no longer use campaign_id=0. The regression test now proves the first no-config check-in creates/loads campaign ID 42 and both day ledger inserts use date-scoped idempotency keys.
diagnosis:
  root_cause: Repository-backed GetCheckInConfig returned an in-memory default config with Campaign.ID=0 when no DB campaign row existed, but ledger tables require a valid campaign FK.
  confidence: high
  affected_files:
    - Games-Labs-Missions/internal/services/check_in_calendar_service.go
    - Games-Labs-Missions/internal/services/check_in_calendar_service_test.go
    - Games-Labs-Missions/internal/repositories/mission_repo.go
artifacts:
  - path: Games-Labs-Missions/internal/services/check_in_calendar_service.go
    action: modified
    description: Persist default check-in config through the repository before returning it when no active campaign row exists.
  - path: Games-Labs-Missions/internal/services/check_in_calendar_service_test.go
    action: modified
    description: Updated regression coverage to expect default config persistence and nonzero campaign IDs before ledger writes.
  - path: Games-Labs-Missions/internal/repositories/mission_repo.go
    action: modified
    description: Preserved idempotent ledger conflict handling with ON CONFLICT DO NOTHING.
next_action:
  agent: reviewer
  reason: Reviewer blockers are fixed with focused regression coverage and full tests/build passing.
