summary: |
  Validated and tightened the GGSoft gameplay turnover lane around the existing
  type `4` end-round settlement flow. The service now exposes small test seams
  so focused tests can assert that Game `TrySettleRound` runs only after wallet-
  success type `4` paths and stays silent for non-settlement callback types.

  Added authoritative turnover fallback from stored type `1` bet state when a
  type `4` end-round callback omits a positive `bet`. Focused GGSoft tests now
  cover `req.Bet` primary, stored-bet fallback, wallet failure skip, no
  forward settlement for type `1` / `2` / `3`, and type `4 end_round=false`
  skip behavior.

  README and verification evidence now include GGSoft-specific log grep
  patterns, wallet SQL, Game `round_lifecycles` SQL, and Missions
  `turnover.settled` downstream checks. GGSoft cancel remains intentionally
  wallet-only; there is no Game reverse contract wired in this task.

  Verification:
  - `go test ./internal/core/services/ggsoft`
  - `go test ./...`
  - `git diff --check`
