summary: |
  Implemented the Daily Activity backoffice contract fixes in Missions. Admin create/update/activate/deactivate now re-read the persisted row before responding, so responses include stored timestamps and defaults such as `claim_limit_per_day` and `reset_timezone`. `GetDailyActivityByID` now returns the full admin detail shape, and `GetProgress` filters out inactive daily rows before status mapping so Mobile reads hide deactivated activities even if they appear in the repository result set. Added a repeatable smoke-test runbook to the Missions README and focused tests for repository, service, and handler behavior.
