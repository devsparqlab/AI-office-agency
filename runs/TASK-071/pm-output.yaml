description: |
  Validate and tighten 1UP gameplay turnover as its own provider lane after TASK-070 establishes the evidence format. Keep Missions consuming Game turnover.settled only.
acceptance_criteria:
  - criterion: "bets/result calls Game SettleRound only after wallet debit/win operations succeed."
  - criterion: "settled_amount uses req.Bet primary and cached bet amount fallback with minor-to-major conversion."
  - criterion: "Refund paths do not call forward SettleRound unless reverse is intentionally implemented."
  - criterion: "Tests cover success, wallet failure, fallback, zero bet, and refund skip."
  - criterion: "README and evidence include 1UP log grep and SQL checklist."
plan:
  approach: "Reuse the IDG provider-specific verification pattern, then tighten 1UP mapper and hook tests around existing bets/result behavior."
  subtasks:
    - order: 1
      id: "oneup-tests"
      description: "Add or tighten tests for conversion, fallback, wallet failure, and refund skip."
      agent: dev-2
      owned_files:
        - "Games-Labs-Provider/internal/core/services/oneup/turnover_test.go"
        - "Games-Labs-Provider/internal/handlers/providerhdl/oneup_callback_test.go"
      parallel_safe: false
    - order: 2
      id: "oneup-hook-adjustments"
      description: "Make minimal code/docs changes if tests reveal drift."
      agent: dev-2
      owned_files:
        - "Games-Labs-Provider/internal/core/services/oneup/callback.go"
        - "Games-Labs-Provider/internal/core/services/oneup/turnover.go"
        - "Games-Labs-Provider/README.md"
      parallel_safe: false
    - order: 3
      id: "oneup-evidence"
      description: "Record runtime SQL/log checklist and exact verification commands."
      agent: dev-2
      owned_files:
        - "ai-dev-office/runs/TASK-071/verification-evidence.md"
      parallel_safe: false
  risks:
    - risk: "Minor/major unit mismatch."
      mitigation: "Lock conversion behavior with table-driven tests."
