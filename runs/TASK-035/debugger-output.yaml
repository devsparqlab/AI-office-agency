summary: |
  Root cause was the missing-session classifier, not the handlers themselves.
  After the UUID shortcut was removed, `classifyOneUpMissingSession` still used
  "player has any other session key" as the signal for `ERR_GAME_NOT_FOUND`.
  That heuristic cannot prove the requested `gameID` is invalid; it only proves
  the player has launched some game before. As a result, invalid-player rows
  could still be misclassified depending on Redis footprint.

  I replaced that heuristic with a production-valid discriminator: when
  `oneup:session:{player}:{game}` is missing, the runtime now checks whether the
  requested `gameID` exists in the upstream 1UP game list. If the game exists,
  the callback returns `errOneUpInvalidSession` and maps to
  `ERR_USER_NOT_FOUND`; if the game does not exist, it returns
  `errOneUpGameNotFound` and maps to `ERR_GAME_NOT_FOUND`.

  I also fixed the test gap the reviewer called out. The old invalid-player and
  invalid-game tests were stubbing `ensureOneUpSessionFn` and
  `validateOneUpPlayerGameFn` directly, which skipped the real
  `redis.Nil -> classifyOneUpMissingSession` path. The new focused tests force
  `redis.Nil` from the session lookup layer and route the handlers through the
  real runtime logic for all eight CSV rows across info, balance, bet result,
  and refund.

  Verification:
  - `go test ./internal/handlers/providerhdl -count=1`
  - `go test ./...`
