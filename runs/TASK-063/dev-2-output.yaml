      - Added `ListUserGame` as the filtered authenticated line using the same Golden Pass access rule.
      - Extended category-game repository reads to load `games.level` so playability can be evaluated server-side.
      - README now documents the delivered ListGame/ListUserGame/ListCategory split.
      - Focused service/handler tests are not present in the current tree and should be tracked as follow-up work.

